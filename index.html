      '<strong style="font-size:14px;color:#F0DC82;">' + step.title + '</strong></div>' +
      '<div style="font-size:13px;line-height:1.7;">' + step.text + '</div>';

    if (step.isBlockIntro && step.blockTypes) {
      innerHTML += '<div id="block-preview-container" style="margin-top:10px;"></div>';
    }

    innerHTML += '<div class="guide-close" id="guide-next-btn">👉 知道了，继续</div>';
    this.tooltip.innerHTML = innerHTML;

    if (step.isBlockIntro && step.blockTypes) {
      const container = document.getElementById('block-preview-container');
      if (container) {
        renderBlockPreviews(container, step.blockTypes, step.highlightType);
      }
      this.tooltip.style.maxWidth = '340px';
    } else {
      this.tooltip.style.maxWidth = '260px';
    }

    this.positionNear(el, step.arrow || 'down', step.isBoard);
    this.backdrop.classList.add('active');
    this.tooltip.style.display = 'block';

    document.getElementById('guide-next-btn').addEventListener('click', () => this.next());

    if (step.isActionGuide) {
      this.waitingForSwap = true;
    }
  },

  positionNear(el, arrowDir, isBoard) {
    const rect = el.getBoundingClientRect();
    const tw = this.tooltip.offsetWidth || 260;
    const th = this.tooltip.offsetHeight || 120;
    const topBar = document.getElementById('top-bar');
    const bottomBar = document.getElementById('bottom-bar');
    const topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
    const bottomBarTop = bottomBar ? bottomBar.getBoundingClientRect().top : window.innerHeight;

    let left = rect.left + rect.width / 2;
    left = Math.max(tw / 2 + 8, Math.min(left, window.innerWidth - tw / 2 - 8));

    let top;
    if (arrowDir === 'down') {
      top = rect.top - th - 14;
      if (top < topBarBottom + 4) top = rect.bottom + 14;
      if (top < topBarBottom + 4) top = topBarBottom + 4;
      this.tooltip.classList.remove('arrow-up');
      this.tooltip.classList.add('arrow-down');
    } else {
      top = rect.bottom + 14;
      if (isBoard) top = rect.top + 8;
      if (top + th > bottomBarTop - 4) top = rect.top - th - 14;
      this.tooltip.classList.remove('arrow-down');
      this.tooltip.classList.add('arrow-up');
    }

    top = Math.max(4, Math.min(top, window.innerHeight - th - 4));
    this.tooltip.style.left = left + 'px';
    this.tooltip.style.top = top + 'px';
    this.tooltip.style.transform = 'translateX(-50%)';
  },

  hide() {
    this.backdrop.classList.remove('active');
    this.tooltip.style.display = 'none';
    this.tooltip.classList.remove('arrow-up', 'arrow-down');
    this.tooltip.style.maxWidth = '260px';
  },

  finish() {
    this.hide();
    this.completed = true;
    this.waitingForSwap = false;
    if (game.levelNum === 1 && typeof tutorialSystem !== 'undefined') {
      setTimeout(function() { tutorialSystem.start(game.board); }, 400);
    }
  },

  onIdle() {},

  onInvalidMove() {},

  notifyMatch() {
    if (this.completed || this.firstMatchDone) return;
    this.firstMatchDone = true;
    this.hide();
    this.tooltip.innerHTML = '<div style="text-align:center;">' +
      '<span style="font-size:24px;">👏</span>' +
      '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
      '<strong>真棒！</strong>污染物被清除了，<br>中间格子变成了<strong>疏松土块</strong>！<br>再消除一次疏松土块就能复耕！</div>' +
      '<div class="guide-close" id="guide-next-btn">继续</div></div>';
    this.positionNear(document.getElementById('board-wrapper'), 'up', true);
    this.backdrop.classList.add('active');
    this.tooltip.style.display = 'block';
    document.getElementById('guide-next-btn').addEventListener('click', () => { this.hide(); this.waitingForSwap = false; });
  },

  notifyReclaim() {
    if (this.completed || this.firstReclaimDone) return;
    this.firstReclaimDone = true;
    this.hide();
    this.tooltip.innerHTML = '<div style="text-align:center;">' +
      '<span style="font-size:28px;">🌱</span>' +
      '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
      '<strong>太好了！</strong>你成功复耕了<br>第一块<strong>健康耕地</strong>！🌾<br>继续守护这片土地吧！</div>' +
      '<div class="guide-close" id="guide-next-btn">继续</div></div>';
    this.positionNear(document.getElementById('board-wrapper'), 'up', true);
    this.backdrop.classList.add('active');
    this.tooltip.style.display = 'block';
    document.getElementById('guide-next-btn').addEventListener('click', () => { this.hide(); this.waitingForSwap = false; });
  }
};
// ============================================================
// 13c. TUTORIAL SYSTEM — 交互式试玩教程 (Level 1 only)
// ============================================================
function findSwapForMatch(board, matchType) {
  const size = board.length;
  // Try every adjacent pair
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      // Try swap right
      if (c + 1 < size) {
        swapCellsRaw(board, r, c, r, c + 1);
        const matches = findAllMatches(board).matchGroups;
        const found = matches.some(m => matchType === 'pollutant' ? m.type !== BLOCK.LOOSE_SOIL : m.type === BLOCK.LOOSE_SOIL);
        swapCellsRaw(board, r, c, r, c + 1); // swap back
        if (found) return [{ r, c }, { r: r, c: c + 1 }];
      }
      // Try swap down
      if (r + 1 < size) {
        swapCellsRaw(board, r, c, r + 1, c);
        const matches = findAllMatches(board).matchGroups;
        const found = matches.some(m => matchType === 'pollutant' ? m.type !== BLOCK.LOOSE_SOIL : m.type === BLOCK.LOOSE_SOIL);
        swapCellsRaw(board, r, c, r + 1, c); // swap back
        if (found) return [{ r, c }, { r: r + 1, c }];
      }
    }
  }
  return null;
}

function swapCellsRaw(board, r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

function isSameSwap(cells, r1, c1, r2, c2) {
  const ids = cells.map(c => c.r + ',' + c.c).sort().join('|');
  const swapIds = [r1 + ',' + c1, r2 + ',' + c2].sort().join('|');
  return ids === swapIds;
}

// Seed loose_soil blocks to guarantee a valid tutorial swap for Phase B
function seedLooseSoilSwap(board) {
  const size = board.length;
  // Pattern: place L at (r, c+1), (r+1, c), (r+1, c+2)
  // Swapping (r, c+1) with (r+1, c+1) creates row r+1: L L L → 3-match
  for (let r = 0; r < size - 1; r++) {
    for (let c = 0; c < size - 2; c++) {
      // Check this area isn't already full of matching patterns
      board[r][c + 1] = BLOCK.LOOSE_SOIL;
      board[r + 1][c] = BLOCK.LOOSE_SOIL;
      board[r + 1][c + 2] = BLOCK.LOOSE_SOIL;
      // Ensure the swap target is NOT loose_soil (needs to actually swap different blocks)
      if (board[r + 1][c + 1] === BLOCK.LOOSE_SOIL) {
        board[r + 1][c + 1] = BLOCK.ORGANIC;
      }
      // Clear any pre-existing matches this might have created
      const { matchGroups } = findAllMatches(board);
      if (matchGroups.length > 0) {
        // Replace matched cells with random pollutants to break the match
        const cfg = game.levelConfig;
        for (const mg of matchGroups) {
          for (const cell of mg.cells) {
            if (board[cell.r][cell.c] === BLOCK.LOOSE_SOIL) {
              board[cell.r][cell.c] = cfg.pollutants[Math.floor(Math.random() * cfg.pollutants.length)];
            }
          }
        }
      }
      return;
    }
  }
}

// Position tooltip to avoid covering highlighted cells
function positionTutorialTooltip(targetCells) {
  const tooltip = document.getElementById('guide-tooltip');
  const boardWrapper = document.getElementById('board-wrapper');
  const boardRect = boardWrapper.getBoundingClientRect();
  const canvasEl = document.getElementById('game-canvas');
  const canvasRect = canvasEl.getBoundingClientRect();

  // Calculate screen positions of the two highlighted cells
  const scaleX = canvasEl.width / canvasRect.width;
  const scaleY = canvasEl.height / canvasRect.height;
  const cellPositions = targetCells.map(function(cell) {
    return {
      x: canvasRect.left + (boardMargin + cell.c * cellSize + cellSize / 2) / scaleX,
      y: canvasRect.top + (boardMargin + cell.r * cellSize + cellSize / 2) / scaleY
    };
  });

  // Average position of highlighted cells
  const avgY = (cellPositions[0].y + cellPositions[1].y) / 2;
  const avgX = (cellPositions[0].x + cellPositions[1].x) / 2;

  // Determine if cells are in top or bottom half of board
  const boardMidY = boardRect.top + boardRect.height / 2;
  const cellsInBottomHalf = avgY > boardMidY;

  const tw = tooltip.offsetWidth || 260;
  const th = tooltip.offsetHeight || 130;
  const topBar = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  const topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
  const bottomBarTop = bottomBar ? bottomBar.getBoundingClientRect().top : window.innerHeight;

  // Position horizontally centered on the highlight cells
  let left = avgX;
  left = Math.max(tw / 2 + 8, Math.min(left, window.innerWidth - tw / 2 - 8));

  let top;
  if (cellsInBottomHalf) {
    // Highlighted cells in bottom half → place tooltip ABOVE the board
    top = boardRect.top - th - 10;
    tooltip.classList.remove('arrow-up');
    tooltip.classList.add('arrow-down');
  } else {
    // Highlighted cells in top half → place tooltip BELOW the board
    top = boardRect.bottom + 10;
    tooltip.classList.remove('arrow-down');
    tooltip.classList.add('arrow-up');
  }

  // Clamp to safe area
  top = Math.max(topBarBottom + 4, Math.min(top, bottomBarTop - th - 4));
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.transform = 'translateX(-50%)';
}

const tutorialSystem = {
  phase: 'done',        // 'pollutant' | 'loose_soil' | 'done'
  targetCells: [],      // [{r, c}, {r, c}]
  waitingForSwap: false,
  highlightIntensity: 0,

  start(board) {
    if (this.phase !== 'done') return;
    this.phase = 'pollutant';
    this.startPhase(board);
  },

  startPhase(board) {
    // Reset cascade guard for each phase
    this._chainFired = false;

    const matchType = this.phase === 'pollutant' ? 'pollutant' : 'loose_soil';
    let swap = findSwapForMatch(board, matchType);

    // For loose_soil phase, seed the board if no valid swap exists
    if (!swap && this.phase === 'loose_soil') {
      seedLooseSoilSwap(board);
      swap = findSwapForMatch(board, matchType);
    }

    if (!swap) {
      // No valid tutorial swap found — skip tutorial
      this.phase = 'done';
      guideSystem.completed = true;
      return;
    }
    this.targetCells = swap;
    this.waitingForSwap = true;

    const tooltip = document.getElementById('guide-tooltip');

    let html;
    if (this.phase === 'pollutant') {
      html = '<div style="text-align:center;">' +
        '<span style="font-size:28px;">👆</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>试试看！</strong><br>拖动这两个<strong style="color:#F0DC82;">高亮闪烁</strong>的方块互换<br>来消除污染物！</div>' +
        '<div class="guide-close" id="tutorial-skip-btn" style="margin-top:6px;opacity:0.6;font-size:10px;">跳过教程 →</div></div>';
    } else {
      html = '<div style="text-align:center;">' +
        '<span style="font-size:28px;">🌱</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>最后一步！</strong><br>交换这两个<strong style="color:#F0DC82;">疏松土块</strong><br>复耕第一块健康耕地！</div>' +
        '<div class="guide-close" id="tutorial-skip-btn" style="margin-top:6px;opacity:0.6;font-size:10px;">跳过教程 →</div></div>';
    }

    tooltip.innerHTML = html;
    // Position tooltip away from highlighted cells
    positionTutorialTooltip(this.targetCells);
    // Don't activate backdrop during interactive swap phases — it blocks touch events on canvas
    tooltip.style.display = 'block';
    startRenderLoop();

    // Skip button handler
    var self = this;
    document.getElementById('tutorial-skip-btn').addEventListener('click', function() {
      self.phase = 'done';
      self.targetCells = [];
      self.waitingForSwap = false;
      guideSystem.hide();
      guideSystem.completed = true;
      stopRenderLoop();
      game.render();
    });
  },

  onSwap(r1, c1, r2, c2) {
    if (!this.waitingForSwap) return false;
    if (!isSameSwap(this.targetCells, r1, c1, r2, c2)) {
      // Wrong swap — brief shake/hint
      const tooltip = document.getElementById('guide-tooltip');
      tooltip.style.animation = 'none';
      tooltip.offsetHeight; // reflow
      tooltip.style.animation = 'tutorialShake 0.4s ease';
      return false; // Allow the swap but show it's wrong
    }
    // Correct swap! Let the game process it
    this.waitingForSwap = false;
    return true;
  },

  onChainComplete(board) {
    if (this.phase === 'done') return;
    // Guard against multiple cascade calls — only handle first chain completion
    if (this._chainFired) return;
    this._chainFired = true;

    const tooltip = document.getElementById('guide-tooltip');
    const backdrop = document.getElementById('guide-backdrop');

    if (this.phase === 'pollutant') {
      // Show success, then move to phase B
      tooltip.innerHTML = '<div style="text-align:center;">' +
        '<span style="font-size:28px;">✅</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>成功！</strong>污染物被清除了<br>中间格子变成了疏松土块！</div>' +
        '<div class="guide-close" id="tutorial-next-btn">👉 继续</div></div>';
      guideSystem.positionNear(document.getElementById('board-wrapper'), 'up', true);
      backdrop.classList.add('active');
      tooltip.style.display = 'block';
      document.getElementById('tutorial-next-btn').addEventListener('click', () => {
        guideSystem.hide();
        // Move to phase B — use current game.board which is the final post-chain state
        this.phase = 'loose_soil';
        this.targetCells = [];
        stopRenderLoop();
        game.render();
        setTimeout(() => this.startPhase(game.board), 500);
      });
    } else if (this.phase === 'loose_soil') {
      // Final success
      tooltip.innerHTML = '<div style="text-align:center;">' +
        '<span style="font-size:32px;">🌾</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>太棒了！</strong>你成功复耕了<br>第一块<strong style="color:#66BB6A;">健康耕地</strong>！</div>' +
        '<div class="guide-close" id="tutorial-done-btn">🎮 开始游戏</div></div>';
      guideSystem.positionNear(document.getElementById('board-wrapper'), 'up', true);
      backdrop.classList.add('active');
      tooltip.style.display = 'block';
      document.getElementById('tutorial-done-btn').addEventListener('click', () => {
        guideSystem.hide();
        this.phase = 'done';
        this.targetCells = [];
        guideSystem.completed = true;
        stopRenderLoop();
        game.render();
      });
    }
  },

  renderHighlights(ctx) {
    if (this.phase === 'done' || this.targetCells.length !== 2 || !cellSize) return;
    if (guideSystem.completed && this.phase === 'done') return;
    const now = performance.now();
    const cs = cellSize;
    const M = boardMargin;
    // Draw directional connector between the two cells
    const [a, b] = this.targetCells;
    const ax = M + a.c * cs + cs / 2, ay = M + a.r * cs + cs / 2;
    const bx = M + b.c * cs + cs / 2, by = M + b.r * cs + cs / 2;
    const midX = (ax + bx) / 2, midY = (ay + by) / 2;
    // Animated arrow between cells
    const arrowBob = Math.sin(now / 400) * 4;
    const arrowAlpha = 0.5 + 0.5 * Math.sin(now / 300);
    ctx.save();
    ctx.globalAlpha = arrowAlpha;
    ctx.fillStyle = '#F0DC82';
    ctx.font = (cs * 0.55) + 'px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👇', midX, midY + arrowBob);
    ctx.restore();
    const highlightCell = (cell, phaseOffset) => {
      const x = M + cell.c * cs, y = M + cell.r * cs;
      const pad = 1;
      const pulseSlow = 0.5 + 0.5 * Math.sin(now / 400 + phaseOffset);
      const pulseFast = 0.5 + 0.5 * Math.sin(now / 180 + phaseOffset);
      const alphaOuter = 0.5 + 0.45 * pulseSlow;
      const alphaInner = 0.7 + 0.3 * pulseFast;
      ctx.save();
      // Layer 1: Wide outer glow
      ctx.shadowColor = 'rgba(255, 180, 0, ' + (alphaOuter * 0.7) + ')';
      ctx.shadowBlur = cs * 0.55;
      ctx.strokeStyle = 'rgba(255, 200, 0, ' + alphaOuter + ')';
      ctx.lineWidth = 5 + 3 * pulseSlow;
      roundRectCtx(ctx, x + pad, y + pad, cs - pad * 2, cs - pad * 2, Math.max(3, cs * 0.12));
      ctx.stroke();
      // Layer 2: Mid bright border
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255, 235, 100, ' + alphaInner + ')';
      ctx.lineWidth = 3.5 + 2 * pulseFast;
      roundRectCtx(ctx, x + pad + 3, y + pad + 3, cs - (pad + 3) * 2, cs - (pad + 3) * 2, Math.max(2, cs * 0.1));
      ctx.stroke();
      // Layer 3: Inner white-hot ring
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alphaInner * 0.8) + ')';
      ctx.lineWidth = 2;
      roundRectCtx(ctx, x + pad + 6, y + pad + 6, cs - (pad + 6) * 2, cs - (pad + 6) * 2, Math.max(2, cs * 0.08));
      ctx.stroke();
      // Corner brackets
      const br = cs * 0.18; // bracket length
      const bw = 3 + 2 * pulseFast; // bracket width
      const bAlpha = 0.6 + 0.4 * pulseFast;
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + bAlpha + ')';
      ctx.lineWidth = bw;
      ctx.lineCap = 'round';
      // Top-left corner
      ctx.beginPath();
      ctx.moveTo(x + pad + 4, y + pad + 4 + br);
      ctx.lineTo(x + pad + 4, y + pad + 4);
      ctx.lineTo(x + pad + 4 + br, y + pad + 4);
      ctx.stroke();
      // Top-right corner
      ctx.beginPath();
      ctx.moveTo(x + cs - pad - 4 - br, y + pad + 4);
      ctx.lineTo(x + cs - pad - 4, y + pad + 4);
      ctx.lineTo(x + cs - pad - 4, y + pad + 4 + br);
      ctx.stroke();
      // Bottom-left corner
      ctx.beginPath();
      ctx.moveTo(x + pad + 4, y + cs - pad - 4 - br);
      ctx.lineTo(x + pad + 4, y + cs - pad - 4);
      ctx.lineTo(x + pad + 4 + br, y + cs - pad - 4);
      ctx.stroke();
      // Bottom-right corner
      ctx.beginPath();
      ctx.moveTo(x + cs - pad - 4, y + cs - pad - 4 - br);
      ctx.lineTo(x + cs - pad - 4, y + cs - pad - 4);
      ctx.lineTo(x + cs - pad - 4 - br, y + cs - pad - 4);
      ctx.stroke();
      ctx.lineCap = 'butt';
      // Sparkle dots orbiting the cell
      const sparkleCount = 4;
      for (let i = 0; i < sparkleCount; i++) {
        const angle = (now / 1200 + i / sparkleCount) * Math.PI * 2;
        const dist = cs * 0.42;
        const sx = x + cs / 2 + Math.cos(angle) * dist;
        const sy = y + cs / 2 + Math.sin(angle) * dist;
        const sparkSize = 3 + 2 * Math.sin(now / 200 + i);
        ctx.fillStyle = 'rgba(255, 255, 220, ' + (0.5 + 0.5 * Math.sin(now / 250 + i * 1.5)) + ')';
        ctx.shadowColor = 'rgba(255, 220, 50, 0.9)';
        ctx.shadowBlur = sparkSize * 2;
        ctx.beginPath();
        ctx.arc(sx, sy, sparkSize, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    };
    highlightCell(this.targetCells[0], 0);
    highlightCell(this.targetCells[1], Math.PI);
  }
};

// Dismiss guide by clicking backdrop
document.getElementById('guide-backdrop').addEventListener('click', () => {
  // Don't dismiss during interactive tutorial swap phase
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.waitingForSwap) return;
  // If tutorial is in progress, clean it up fully
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.phase !== 'done') {
    tutorialSystem.phase = 'done';
    tutorialSystem.targetCells = [];
    tutorialSystem.waitingForSwap = false;
    stopRenderLoop();
  }
  guideSystem.completed = true;
  guideSystem.hide();
  game.render();
});

// Hook guide into game processChain
const origProcessChain = game.processChain.bind(game);
game.processChain = function(matchGroups) {
  const hasLooseSoilMatch = matchGroups.some(m => m.type === BLOCK.LOOSE_SOIL);
  const hasPollutantMatch = matchGroups.some(m => m.type !== BLOCK.LOOSE_SOIL);

  if (hasPollutantMatch) guideSystem.notifyMatch();
  if (hasLooseSoilMatch) guideSystem.notifyReclaim();

  // If waiting for first swap, mark complete
  if (guideSystem.waitingForSwap) {
    guideSystem.hide();
    guideSystem.waitingForSwap = false;
  }

  const result = origProcessChain(matchGroups);

  // Notify tutorial after chain completes
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.phase !== 'done') {
    setTimeout(() => tutorialSystem.onChainComplete(game.board), 500);
  }

  return result;
};

// ============================================================
// 14. LEVEL SELECTOR LOGIC
// ============================================================
function updateLevelSelector() {
  const savedLevel = loadProgress();
  const currentLevel = game.levelNum;
  const buttons = document.querySelectorAll('.level-btn');

  buttons.forEach(btn => {
    const lv = Number(btn.dataset.level);
    btn.classList.remove('active', 'unlocked', 'locked');
    btn.disabled = false;

    if (lv === currentLevel) {
      btn.classList.add('active');
      btn.textContent = lv + ' · ' + LEVELS[lv - 1].name;
    } else if (lv <= savedLevel) {
      btn.classList.add('unlocked');
      btn.textContent = lv + ' · ' + LEVELS[lv - 1].name;
    } else {
      btn.classList.add('locked');
      btn.textContent = '🔒 ' + lv + ' · ' + LEVELS[lv - 1].name;
      btn.disabled = true;
    }
  });

  // Redraw hand-drawn level selector canvas
  drawLevelCanvasFn();
}

// Level button click handlers
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('locked')) return;
    const lv = Number(btn.dataset.level);
    if (lv !== game.levelNum) {
      initAudio();
      game.initLevel(lv);
      updateLevelSelector();
    }
  });
});

document.getElementById('btn-restart').addEventListener('click', () => {
  initAudio();
  game.restartLevel();
  updateLevelSelector();
});

document.getElementById('btn-next').addEventListener('click', () => {

});

document.getElementById('btn-summary-restart').addEventListener('click', () => {
  document.getElementById('summary-screen').classList.remove('active');
  document.getElementById('game-container').style.display = '';
  game.restartAll();
  updateLevelSelector();
});

// ============================================================
// 16. INIT
// ============================================================
function startGame() {
  const savedLevel = loadProgress();
  game.initLevel(savedLevel);
  updateLevelSelector();

  // Initial UI canvas render — double rAF ensures post-layout sizing
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      redrawAllUI();
    });
  });

  // Handle resize
  window.addEventListener('resize', () => {
    resizeCanvas(game.levelConfig.size);
    game.render();
    redrawAllUI();
  });

  console.log('🌾 沃土新生 — Ready');
  console.log('关卡:', game.levelConfig.name);
  console.log('棋盘:', game.levelConfig.size + '×' + game.levelConfig.size);
  console.log('目标: 复耕', game.target, '块健康耕地');
}
