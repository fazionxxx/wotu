<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>沃土新生 - 2026全国土地日</title>
<style>
  :root {
    --frame-dark: #43250A; --frame-mid: #5C3516; --frame-light: #7A4E2A;
    --parchment: #F7F2B1; --parchment-dim: #E8DF98; --parchment-bright: #FDFBC8;
    --gold: #E1CB6B; --gold-light: #F0DC82; --gold-dark: #C4A840;
    --green: #96B356; --green-light: #B2CC78;
    --text-dark: #3E2410; --text-light: #FDF8D0;
    --danger: #E53935;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: #2a2218 center/cover no-repeat fixed; /* beijing.png URL set after preload */
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  /* Subtle vignette overlay — darkens edges to keep text readable over bg image */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 50% 30%, rgba(26,20,16,0.10) 0%, rgba(26,20,16,0.30) 60%, rgba(10,8,4,0.50) 100%);
  }
  #game-container {
    width: 100%; max-width: 480px; padding: 8px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  /* ── UI Canvas overlay system ── */
  .ui-section { position: relative; width: 100%; }
  .ui-bg-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .ui-overlay { position: relative; z-index: 1; }

  #top-bar {
    width: 100%; padding: 10px 14px; color: #3E2410;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 88px; /* ensure canvas has room */
  }
  #top-bar .info-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 500;
  }
  #level-name { font-size: 15px; font-weight: 700; color: #F0DC82; letter-spacing: 1px;
    text-shadow: 0 1px 3px rgba(30,15,5,0.5); }
  .stat { display: flex; align-items: center; gap: 4px; text-align: center; }
  .stat-icon { font-size: 16px; filter: drop-shadow(0 1px 2px rgba(30,15,5,0.35)); }
  .stat-value { font-weight: 700; font-size: 14px; color: #2E1808;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15); }
  #grain-bar-wrapper { display: flex; align-items: center; gap: 8px; }
  #farmer-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #F0DC82; border: 2.5px solid #A88920; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    box-shadow: 0 2px 4px rgba(30,15,5,0.3);
  }
  #grain-bar-outer {
    flex: 1; height: 18px; overflow: hidden; position: relative;
    visibility: hidden; /* Canvas draws the grain bar behind */
  }
  #grain-bar-inner { visibility: hidden; }
  #grain-bar-label { font-size: 10px; font-weight: 600; color: #F0DC82; white-space: nowrap; min-width: 42px; text-align: right; text-shadow: 0 1px 3px rgba(30,15,5,0.45); }
  #board-wrapper {
    position: relative;
    border-radius: 10px; padding: 6px; box-shadow: 0 4px 16px rgba(30,15,5,0.30);
    display: flex; align-items: center; justify-content: center;
  }
  canvas#game-canvas { display: block; cursor: pointer; }
  /* Block Legend */
  #block-legend {
    width: 100%; max-width: 480px; padding: 4px 10px;
    min-height: 50px;
  }
  #block-legend .legend-label {
    font-size: 11px; font-weight: 600; color: #F0DC82;
    white-space: nowrap; margin-bottom: 4px;
    text-shadow: 0 1px 3px rgba(30,15,5,0.4);
    text-align: center;
  }
  #block-legend .legend-row {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: flex-end;
  }
  #block-legend .legend-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 4px 6px; border-radius: 10px;
    transition: background 0.2s, transform 0.15s;
    min-width: 52px;
  }
  #block-legend .legend-item:hover { background: rgba(253,251,200,0.15); }
  #block-legend .legend-item:active { transform: scale(0.92); }
  #block-legend .legend-icon-wrap {
    width: 38px; height: 38px; border-radius: 8px; overflow: hidden;
    box-shadow: 0 2px 6px rgba(30,15,5,0.25);
    border: 2px solid rgba(67,37,10,0.35);
    background: rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  #block-legend .legend-icon-wrap canvas {
    display: block; width: 100%; height: 100%;
  }
  #block-legend .legend-name {
    font-size: 10px; color: #FDF8D0; font-weight: 500;
    text-shadow: 0 1px 2px rgba(30,15,5,0.4);
    text-align: center; line-height: 1.2; max-width: 56px;
  }

  /* Level Selector */
  #level-selector {
    width: 100%; max-width: 480px; padding: 8px 10px;
    flex-wrap: wrap; justify-content: center;
    min-height: 42px; /* ensure canvas has room */
  }
  #level-selector .level-select-label {
    font-size: 12px; font-weight: 600; color: #F0DC82;
    white-space: nowrap; margin-right: 2px;
    text-shadow: 0 1px 3px rgba(30,15,5,0.45);
  }
  .level-btn {
    flex: 1; min-width: 90px; padding: 7px 10px;
    border: none;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.25s; white-space: nowrap;
    letter-spacing: 0.3px; text-align: center;
    background: transparent; color: #3E2410;
    position: relative; z-index: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.12);
  }
  .level-btn.active {
    background: transparent;
    color: #2E1808;
    text-shadow: 0 1px 3px rgba(0,0,0,0.18);
  }
  .level-btn.unlocked {
    background: transparent;
    color: #3E2410;
  }
  .level-btn.unlocked:hover { background: rgba(253,251,200,0.12); }
  .level-btn.locked {
    background: transparent;
    color: #8B8070; cursor: not-allowed; opacity: 0.75;
  }
  .level-btn:active:not(.locked) { transform: scale(0.95); }

  #bottom-bar { width: 100%; padding: 8px 0; display: flex; justify-content: center; gap: 12px; position: relative; }
  #bottom-bar button {
    padding: 8px 22px; border: 2px solid rgba(67,37,10,0.35);
    border-radius: 20px; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; text-align: center;
    cursor: pointer; transition: transform 0.15s, background 0.2s, box-shadow 0.2s; touch-action: manipulation;
    background: rgba(247,242,177,0.55); color: #3E2410;
    text-shadow: 0 1px 2px rgba(0,0,0,0.08);
    box-shadow: 0 2px 8px rgba(30,15,5,0.15);
  }
  #bottom-bar button:hover { background: rgba(247,242,177,0.75); box-shadow: 0 3px 12px rgba(30,15,5,0.22); }
  #bottom-bar button:active { transform: scale(0.95); }
  #btn-restart { color: #3E2410; }
  #btn-next { color: #3E2410; display: none; }
  #btn-rules { color: #3E2410; font-size: 13px; }
  #rules-popup-box { max-height: 75vh; overflow-y: auto; text-align: left; }
  #rules-popup-box .rule-section { margin-bottom: 14px; }
  #rules-popup-box .rule-section h4 { font-size: 14px; color: #43250A; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  #rules-popup-box .rule-section p { font-size: 12px; color: #5C3516; line-height: 1.7; margin: 0; }
  #rules-popup-box .rule-blocks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  #rules-popup-box .rule-block-tag {
    font-size: 12px; padding: 4px 10px; border-radius: 12px;
    background: rgba(247,242,177,0.55); color: #43250A; white-space: nowrap;
    border: 1.5px solid rgba(67,37,10,0.2);
  }
  #popup-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(30,15,5,0.55); display: none;
    align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  }
  #popup-overlay.active { display: flex; }
  #popup-box {
    background: linear-gradient(180deg, #FDFBC8 0%, #F7F2B1 40%, #E8DF98 100%);
    border-radius: 14px; padding: 24px 20px; max-width: 340px; width: 85%;
    text-align: center; box-shadow: 0 8px 32px rgba(30,15,5,0.4);
    animation: popupIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 3px solid rgba(67,37,10,0.55);
  }
  @keyframes popupIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #popup-icon { font-size: 48px; margin-bottom: 8px; }
  #popup-title { font-size: 20px; font-weight: 700; color: #3E2410; margin-bottom: 6px; }
  #popup-message { font-size: 13px; color: #5C3516; line-height: 1.7; margin-bottom: 16px; }
  #popup-quote {
    background: #FDFBC8; border-left: 4px solid #A88920;
    padding: 10px 12px; font-size: 12px; color: #5C3516; line-height: 1.6;
    text-align: left; margin-bottom: 16px; border-radius: 0 8px 8px 0; display: none;
  }
  #popup-quote .attribution { display: block; text-align: right; color: #7A4E2A; font-size: 11px; margin-top: 4px; }
  #popup-btn {
    display: inline-block; padding: 10px 36px; border: 2px solid rgba(60,30,12,0.45);
    border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px;
    transition: transform 0.15s;
  }
  #popup-btn:active { transform: scale(0.95); }
  .win-btn { background: linear-gradient(180deg, #F0DC82, #C4A840); color: #3E2410; box-shadow: 0 3px 14px rgba(196,168,64,0.5); }
  .lose-btn { background: linear-gradient(180deg, #EF5350, #E53935); color: white; box-shadow: 0 3px 14px rgba(229,57,53,0.4); }
  .summary-btn { background: linear-gradient(180deg, #E1CB6B, #C4A840); color: #3E2410; box-shadow: 0 3px 14px rgba(196,168,64,0.5); }
  #guide-tooltip {
    position: fixed; z-index: 80; background: linear-gradient(180deg, #FDFBC8, #F7F2B1);
    color: #3E2410; padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.6;
    max-width: 260px; text-align: left; pointer-events: auto;
    display: none; box-shadow: 0 4px 20px rgba(30,15,5,0.4);
    transition: opacity 0.3s; cursor: default;
    border: 2.5px solid rgba(67,37,10,0.5);
  }
  #guide-tooltip .guide-close {
    display: inline-block; margin-top: 8px; padding: 4px 14px;
    background: rgba(196,168,64,0.3); border-radius: 14px;
    font-size: 11px; cursor: pointer; color: #5C3516;
    text-align: center; transition: background 0.2s;
    border: 1.5px solid rgba(196,168,64,0.4);
  }
  #guide-tooltip .guide-close:hover { background: rgba(196,168,64,0.5); }
  #guide-tooltip::after {
    content: ''; position: absolute; width: 0; height: 0;
    border-left: 8px solid transparent; border-right: 8px solid transparent;
  }
  #guide-tooltip.arrow-down::after {
    top: -8px; left: 50%; transform: translateX(-50%);
    border-bottom: 8px solid #FDFBC8;
    border-top: none;
  }
  #guide-tooltip.arrow-up::after {
    bottom: -8px; left: 50%; transform: translateX(-50%);
    border-top: 8px solid #E8DF98;
    border-bottom: none;
  }
  @keyframes tutorialShake {
    0%, 100% { transform: translateX(-50%); }
    20% { transform: translateX(calc(-50% - 6px)); }
    40% { transform: translateX(calc(-50% + 6px)); }
    60% { transform: translateX(calc(-50% - 4px)); }
    80% { transform: translateX(calc(-50% + 4px)); }
  }
  @keyframes tutorialGlowPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
  }
  @keyframes tutorialSparkle {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2) rotate(120deg); opacity: 1; }
    70% { transform: translate(-50%, -50%) scale(0.8) rotate(240deg); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(0) rotate(360deg); opacity: 0; }
  }
  @keyframes tutorialArrowBob {
    0%, 100% { transform: translate(-50%, -50%); }
    50% { transform: translate(-50%, calc(-50% - 6px)); }
  }
  #guide-backdrop {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(20,10,5,0.45); z-index: 75; display: none;
    pointer-events: auto;
  }
  #guide-backdrop.active { display: block; }
  #btn-mute {
    position: fixed; top: 12px; right: 12px; width: 36px; height: 36px;
    border-radius: 50%; border: 2px solid rgba(67,37,10,0.45);
    background: rgba(247,242,177,0.85);
    font-size: 18px; cursor: pointer; z-index: 50;
    box-shadow: 0 2px 8px rgba(30,15,5,0.2);
    display: flex; align-items: center; justify-content: center;
  }
  #summary-screen {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, #FDFBC8 0%, #F7F2B1 50%, #E8DF98 100%);
    z-index: 200; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  #summary-screen.active { display: flex; }
  #summary-screen h2 { font-size: 24px; color: #3E2410; margin-bottom: 8px; }
  .summary-stats { font-size: 15px; color: #43250A; line-height: 2; margin-bottom: 16px; }
  .summary-stats span { font-weight: 700; color: #7A4E2A; }

  /* Preloader */
  #preloader {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(180deg, #3d2e1c 0%, #2a2218 50%, #1a1410 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 24px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  #preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #preloader .preloader-card {
    background: linear-gradient(180deg, #FDFBC8 0%, #F7F2B1 50%, #E8DF98 100%);
    border-radius: 16px; padding: 32px 24px;
    max-width: 380px; width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(30,15,5,0.45);
    animation: preloaderFadeIn 0.6s ease;
    border: 3px solid rgba(67,37,10,0.5);
  }
  @keyframes preloaderFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #preloader .preloader-icon { font-size: 56px; margin-bottom: 8px; }
  #preloader h1 {
    font-size: 28px; color: #3E2410; font-weight: 800;
    letter-spacing: 2px; margin-bottom: 4px;
  }
  #preloader .preloader-subtitle {
    font-size: 13px; color: #7A4E2A; margin-bottom: 20px;
    letter-spacing: 1px;
  }
  #preloader .preloader-divider {
    width: 48px; height: 3px; background: #C4A840;
    border-radius: 2px; margin: 0 auto 16px;
  }
  #preloader .preloader-bar-track {
    width: 100%; height: 8px; background: rgba(67,37,10,0.12);
    border-radius: 4px; overflow: hidden;
  }
  #preloader .preloader-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #C4A840, #F0DC82);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  #preloader .preloader-text {
    margin-top: 12px; font-size: 13px; color: #7A4E2A;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="preloader">
  <div class="preloader-card">
    <div class="preloader-icon">🌍</div>
    <h1>沃土新生</h1>
    <div class="preloader-subtitle">2026年全国土地日</div>
    <div class="preloader-divider"></div>
    <div class="preloader-bar-track">
      <div class="preloader-bar-fill" id="preloader-bar"></div>
    </div>
    <div class="preloader-text" id="preloader-text">正在加载素材...</div>
  </div>
</div>

<button id="btn-mute" aria-label="音效开关">🔊</button>

<div id="game-container">
  <div id="top-bar" class="ui-section">
    <canvas class="ui-bg-canvas" id="top-canvas"></canvas>
    <div class="ui-overlay">
      <div class="info-row">
        <span id="level-name">复苏之风</span>
        <span class="stat"><span class="stat-icon">🌾</span> 复耕 <span class="stat-value" id="reclaim-progress">0/6</span></span>
        <span class="stat"><span class="stat-icon">👣</span> 步数 <span class="stat-value" id="steps-left">30</span></span>
      </div>
      <div id="grain-bar-wrapper">
        <div id="farmer-avatar">👨‍🌾</div>
        <div id="grain-bar-outer"><div id="grain-bar-inner" style="width:100%"></div></div>
        <span id="grain-bar-label">粮食 100%</span>
      </div>
    </div>
  </div>
  <div id="level-selector" class="ui-section">
    <canvas class="ui-bg-canvas" id="level-canvas"></canvas>
    <div class="ui-overlay" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;width:100%;">
      <span class="level-select-label">🗺️ 关卡</span>
      <button class="level-btn active" data-level="1">1 · 复苏之风</button>
      <button class="level-btn locked" data-level="2">🔒 2 · 大地疗愈</button>
      <button class="level-btn locked" data-level="3">🔒 3 · 沃野守卫</button>
    </div>
  </div>
  <div id="board-wrapper"><canvas id="game-canvas"></canvas></div>
  <div id="block-legend" class="ui-section">
    <canvas class="ui-bg-canvas" id="legend-canvas"></canvas>
    <div class="ui-overlay">
      <div class="legend-label">📦 本关方块</div>
      <div class="legend-row" id="legend-row"></div>
    </div>
  </div>
  <div id="bottom-bar">
    <canvas class="ui-bg-canvas" id="bottom-canvas"></canvas>
    <button id="btn-restart">🔄 重玩</button>
    <button id="btn-rules">📋 规则</button>
    <button id="btn-next">▶ 下一关</button>
    </div>
  </div>
</div>

<div id="popup-overlay">
  <div id="popup-box">
    <div id="popup-icon"></div>
    <div id="popup-title"></div>
    <div id="popup-message"></div>
    <div id="popup-quote"><span id="popup-quote-text"></span><span class="attribution" id="popup-quote-source"></span></div>
    <button id="popup-btn"></button>
  </div>
</div>

<div id="guide-backdrop"></div>
<div id="guide-tooltip"></div>

<div id="summary-screen">
  <div style="font-size:56px;margin-bottom:12px;">🌍🌾</div>
  <h2>沃土新生！</h2>
  <p style="color:#43250A;margin-bottom:16px;">感谢你为守护土地做出的贡献</p>
  <div class="summary-stats">
    共修复耕地：<span id="summary-total-farmland">0</span> 块<br>
    节约粮食储备：<span id="summary-grain-saved">0</span>%<br>
    通关关卡：<span id="summary-levels-cleared">3</span> / 3
  </div>
  <p style="font-size:13px;color:#7A4E2A;max-width:280px;line-height:1.6;margin-bottom:20px;">
    "珍惜每一寸土地 促进高质量发展"<br>——2026年全国土地日
  </p>
  <button id="btn-summary-restart" style="padding:12px 40px;border:2px solid rgba(67,37,10,0.35);border-radius:18px;font-size:16px;font-weight:600;background:linear-gradient(180deg,#F0DC82,#C4A840);color:#3E2410;cursor:pointer;box-shadow:0 3px 12px rgba(196,168,64,0.45);">🔄 重新开始</button>
</div>

<script>
// ============================================================
// 1. CONFIG — 配置层
// ============================================================

const BLOCK = {
  COMPACTION:    'compaction',     // 板结块
  HEAVY_METAL:   'heavy_metal',    // 重金属污染块
  ORGANIC:       'organic',        // 有机污染物
  DESERT:        'desert',         // 沙化块
  SALINE:        'saline',         // 盐碱晶
  LOOSE_SOIL:    'loose_soil',     // 疏松土块
  HEALTHY_FARM:  'healthy_farm'    // 健康耕地
};

const POLLUTANTS = [BLOCK.COMPACTION, BLOCK.HEAVY_METAL, BLOCK.ORGANIC, BLOCK.DESERT, BLOCK.SALINE];

// Block colors (fill, stroke)
const BLOCK_COLORS = {
  [BLOCK.COMPACTION]:   { fill: '#8D6E63', stroke: '#6D4C41', light: '#A1887F' },
  [BLOCK.HEAVY_METAL]:  { fill: '#7B1FA2', stroke: '#6A1B9A', light: '#9C27B0' },
  [BLOCK.ORGANIC]:      { fill: '#558B2F', stroke: '#33691E', light: '#689F38' },
  [BLOCK.DESERT]:       { fill: '#F9A825', stroke: '#F57F17', light: '#FBC02D' },
  [BLOCK.SALINE]:       { fill: '#B0BEC5', stroke: '#90A4AE', light: '#CFD8DC' },
  [BLOCK.LOOSE_SOIL]:   { fill: '#A1887F', stroke: '#8D6E63', light: '#BCAAA4' },
  [BLOCK.HEALTHY_FARM]: { fill: '#5D4037', stroke: '#4E342E', light: '#6D4C41' },

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = randInt(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function seededRand(r, c, seed) { let h = (r * 374761393 + c * 668265263 + seed * 1274126177) & 0x7fffffff; h = ((h >> 16) ^ h) * 0x45d9f3b; h = ((h >> 16) ^ h) & 0x7fffffff; return h / 0x7fffffff; }

// 2.5. ANIMATION UTILITIES
// ============================================================
function animateOver(duration, updateFn) {
  return new Promise(resolve => {
    const start = performance.now();
    function tick(time) {
      const t = Math.min(1, (time - start) / duration);
      updateFn(t);
      if (t < 1) {
        requestAnimationFrame(tick);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutBounce(t) {
  const n1 = 7.5625, d1 = 2.75;
  if (t < 1 / d1) return n1 * t * t;
  else if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
  else if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
  else return n1 * (t -= 2.625 / d1) * t + 0.984375;
}

// ============================================================
// 3. BOARD — 棋盘数据模型
// ============================================================
function createEmptyBoard(size) {
  return Array.from({ length: size }, () => Array(size).fill(null));
}

function cloneBoard(board) {
  return board.map(row => [...row]);
}

function boardToString(board) {
  return board.map(row => row.map(c => c ? c[0] : '.').join('')).join('\n');
}

function createBoard(size, pollutantTypes, looseSoilCount) {
  const board = createEmptyBoard(size);
  const totalCells = size * size;
  const allPositions = [];
  for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) allPositions.push({ r, c });

  // Shuffle positions for random placement
  const shuffled = shuffle([...allPositions]);

  // Place loose soil blocks
  const count = typeof looseSoilCount === 'number'
    ? looseSoilCount
    : randInt(looseSoilCount[0], looseSoilCount[1]);
  for (let i = 0; i < count; i++) {
    const pos = shuffled[i];
    board[pos.r][pos.c] = BLOCK.LOOSE_SOIL;
  }

  // Fill remaining with random pollutants
  for (let i = count; i < totalCells; i++) {
    const pos = shuffled[i];
    board[pos.r][pos.c] = randChoice(pollutantTypes);
  }

  // Remove initial matches
  removeInitialMatches(board, pollutantTypes);
  return board;
}

function removeInitialMatches(board, pollutantTypes) {
  const size = board.length;
  for (let attempt = 0; attempt < 30; attempt++) {
    const matches = findAllMatchesRaw(board);
    if (matches.length === 0) return;

    // Pick a random matched cell and replace it with a different pollutant
    const cell = randChoice(matches);
    const currentType = board[cell.r][cell.c];
    const candidates = pollutantTypes.filter(t => t !== currentType);
    if (candidates.length > 0) {
      board[cell.r][cell.c] = randChoice(candidates);
    } else {
      // Only one pollutant type — swap with a random neighbor
      const neighbors = getNeighbors(cell.r, cell.c, size);
      if (neighbors.length > 0) {
        const nb = randChoice(neighbors);
        const tmp = board[cell.r][cell.c];
        board[cell.r][cell.c] = board[nb.r][nb.c];
        board[nb.r][nb.c] = tmp;
      }
    }
  }
}

function getNeighbors(r, c, size) {
  const neighbors = [];
  if (r > 0) neighbors.push({ r: r - 1, c });
  if (r < size - 1) neighbors.push({ r: r + 1, c });
  if (c > 0) neighbors.push({ r, c: c - 1 });
  if (c < size - 1) neighbors.push({ r, c: c + 1 });
  return neighbors;
}

function isAdjacent(r1, c1, r2, c2) {
  return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

// ============================================================
// 4. MATCH DETECTOR — 匹配检测
// ============================================================
function findAllMatchesRaw(board) {
  const size = board.length;
  const cellInMatch = new Set();

  function key(r, c) { return r * size + c; }

  // Scan horizontal
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size - 2; c++) {
      const a = board[r][c], b = board[r][c+1], d = board[r][c+2];
      if (a && a === b && b === d && a !== BLOCK.HEALTHY_FARM) {
        cellInMatch.add(key(r, c));
        cellInMatch.add(key(r, c+1));
        cellInMatch.add(key(r, c+2));
      }
    }
  }

  // Scan vertical
  for (let c = 0; c < size; c++) {
    for (let r = 0; r < size - 2; r++) {
      const a = board[r][c], b = board[r+1][c], d = board[r+2][c];
      if (a && a === b && b === d && a !== BLOCK.HEALTHY_FARM) {
        cellInMatch.add(key(r, c));
        cellInMatch.add(key(r+1, c));
        cellInMatch.add(key(r+2, c));
      }
    }
  }

  return [...cellInMatch].map(v => ({ r: Math.floor(v / size), c: v % size }));
}

function findAllMatches(board) {
  const size = board.length;
  const cellInMatch = new Set();
  const matchGroups = [];

  function key(r, c) { return r * size + c; }

  // Scan horizontal
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size - 2; c++) {
      const a = board[r][c], b = board[r][c+1], d = board[r][c+2];
      if (a && a === b && b === d && a !== BLOCK.HEALTHY_FARM) {
        const cells = [{ r, c }, { r, c: c+1 }, { r, c: c+2 }];
        matchGroups.push({ cells, type: a });
        cells.forEach(cell => cellInMatch.add(key(cell.r, cell.c)));
      }
    }
  }

  // Scan vertical
  for (let c = 0; c < size; c++) {
    for (let r = 0; r < size - 2; r++) {
      const a = board[r][c], b = board[r+1][c], d = board[r+2][c];
      if (a && a === b && b === d && a !== BLOCK.HEALTHY_FARM) {
        const cells = [{ r, c }, { r: r+1, c }, { r: r+2, c }];
        matchGroups.push({ cells, type: a });
        cells.forEach(cell => cellInMatch.add(key(cell.r, cell.c)));
      }
    }
  }

  return { matchGroups, matchedCells: cellInMatch };
}

// ============================================================
// 5. ELIMINATOR — 消除与转化
// ============================================================
function processMatches(board, matchGroups) {
  const size = board.length;
  const newBoard = cloneBoard(board);
  let reclaimedCount = 0;

  // Track which position each cell transforms to
  // For each match: middle cell transforms, sides become null
  // If a cell is in multiple matches, prioritize middle role
  const transforms = {}; // key -> newType (null means empty)

  function key(r, c) { return r * size + c; }

  for (const match of matchGroups) {
    const cells = match.cells;
    // Sort cells by position to identify middle
    if (cells[0].r === cells[1].r && cells[1].r === cells[2].r) {
      // Horizontal match - sort by column
      cells.sort((a, b) => a.c - b.c);
    } else {
      // Vertical match - sort by row
      cells.sort((a, b) => a.r - b.r);
    }

    const middle = cells[1];
    const mk = key(middle.r, middle.c);

    // Middle transforms
    if (match.type === BLOCK.LOOSE_SOIL) {
      transforms[mk] = BLOCK.HEALTHY_FARM;
      reclaimedCount++;
    } else {
      transforms[mk] = BLOCK.LOOSE_SOIL;
    }

    // Sides become empty (unless they're also a middle in another match)
    const sk0 = key(cells[0].r, cells[0].c);
    const sk2 = key(cells[2].r, cells[2].c);
    if (!(sk0 in transforms)) transforms[sk0] = null;
    if (!(sk2 in transforms)) transforms[sk2] = null;
  }

  // Apply transforms
  for (const [k, v] of Object.entries(transforms)) {
    const r = Math.floor(Number(k) / size);
    const c = Number(k) % size;
    newBoard[r][c] = v;
  }

  return { board: newBoard, reclaimedCount };
}

// ============================================================
// 6. GRAVITY — 重力掉落与填充
// ============================================================
function applyGravity(board, pollutantTypes) {
  const size = board.length;
  const newBoard = createEmptyBoard(size);

  for (let c = 0; c < size; c++) {
    // Collect non-null blocks from bottom to top
    const blocks = [];
    for (let r = size - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        blocks.push(board[r][c]);
      }
    }

    // Fill from bottom up
    let blockIdx = 0;
    for (let r = size - 1; r >= 0; r--) {
      if (blockIdx < blocks.length) {
        newBoard[r][c] = blocks[blockIdx];
        blockIdx++;
      } else {
        // Top empty cells: fill with random pollutants
        newBoard[r][c] = randChoice(pollutantTypes);
      }
    }
  }

  return newBoard;
}

function resolveChain(board, pollutantTypes) {
  let totalReclaimed = 0;
  let safety = 100;

  while (safety-- > 0) {
    const { matchGroups } = findAllMatches(board);
    if (matchGroups.length === 0) break;

    const result = processMatches(board, matchGroups);
    board = result.board;
    totalReclaimed += result.reclaimedCount;
    board = applyGravity(board, pollutantTypes);
  }

  return { board, totalReclaimed };
}

const PALETTE = {

  parchment:    '#F7F2B1', parchmentDim: '#E8DF98', parchmentBright:'#FDFBC8',

  green:        '#96B356', greenLight: '#B2CC78',

};

function hashXY(x, y, seed) {
  let h = ((x * 374761393 + y * 668265263 + seed * 1274126177) >>> 0);
  h = ((h ^ (h >> 13)) * 1274126177) >>> 0;
  return (h & 0x7fffffff) / 0x7fffffff;
}

function wobblyLine(ctx, x1, y1, x2, y2, jitter, seed) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 0.5) { ctx.lineTo(x2, y2); return; }
  const nx = -dy / len, ny = dx / len;
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const jx = (hashXY(Math.round(mx), Math.round(my), seed) - 0.5) * jitter * len * 0.4;
  ctx.quadraticCurveTo(mx + nx * jx, my + ny * jx, x2, y2);
}

function wobblyRoundRect(ctx, x, y, w, h, r, jitter, seed) {
  const maxR = Math.min(w, h) / 2 - 1;
  const cr = Math.min(r, maxR);
  const j = jitter * Math.min(w, h);

  ctx.beginPath();
  ctx.moveTo(x + cr, y);
  wobblyLine(ctx, x + cr, y, x + w - cr, y, jitter, seed);
  const tr_jx = (hashXY(10, 0, seed) - 0.5) * j * 0.6;
  const tr_jy = (hashXY(10, 1, seed) - 0.5) * j * 0.6;
  ctx.quadraticCurveTo(x + w + tr_jx, y + tr_jy, x + w - cr + tr_jx * 0.3, y + cr + tr_jy * 0.3);
  wobblyLine(ctx, x + w, y + cr, x + w, y + h - cr, jitter, seed + 11);
  const br_jx = (hashXY(20, 0, seed) - 0.5) * j * 0.6;
  const br_jy = (hashXY(20, 1, seed) - 0.5) * j * 0.6;
  ctx.quadraticCurveTo(x + w + br_jx, y + h + br_jy, x + w - cr + br_jx * 0.3, y + h - cr + br_jy * 0.3);
  wobblyLine(ctx, x + w - cr, y + h, x + cr, y + h, jitter, seed + 22);
  const bl_jx = (hashXY(30, 0, seed) - 0.5) * j * 0.6;
  const bl_jy = (hashXY(30, 1, seed) - 0.5) * j * 0.6;
  ctx.quadraticCurveTo(x + bl_jx, y + h + bl_jy, x + cr + bl_jx * 0.3, y + h - cr + bl_jy * 0.3);
  wobblyLine(ctx, x, y + h - cr, x, y + cr, jitter, seed + 33);
  const tl_jx = (hashXY(40, 0, seed) - 0.5) * j * 0.6;
  const tl_jy = (hashXY(40, 1, seed) - 0.5) * j * 0.6;
  ctx.quadraticCurveTo(x + tl_jx, y + tl_jy, x + cr + tl_jx * 0.3, y + cr + tl_jy * 0.3);
  ctx.closePath();
}

function handStroke(ctx, color, baseWidth, passes, offsetMax, seed) {
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let p = 0; p < passes; p++) {
    const ox = (hashXY(p, 0, seed) - 0.5) * offsetMax;
    const oy = (hashXY(p, 1, seed) - 0.5) * offsetMax;
    const lw = baseWidth * (0.75 + hashXY(p, 2, seed) * 0.5);
    ctx.lineWidth = lw;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.stroke();
    ctx.restore();
  }
}

function speckleNoise(ctx, x, y, w, h, count, colorBase, alphaRange, seed) {
  for (let i = 0; i < count; i++) {
    const sx = x + hashXY(i, 0, seed) * w;
    const sy = y + hashXY(i, 1, seed) * h;
    const sr = 0.3 + hashXY(i, 2, seed) * 1.6;
    const alpha = alphaRange[0] + hashXY(i, 3, seed) * (alphaRange[1] - alphaRange[0]);
    ctx.fillStyle = colorBase.replace('A', alpha.toFixed(2));
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function handHatch(ctx, x, y, w, h, count, color, seed) {
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  for (let i = 0; i < count; i++) {
    const hx = x + hashXY(i, 0, seed) * w;
    const hy = y + hashXY(i, 1, seed) * h;
    const angle = hashXY(i, 2, seed) * Math.PI * 2;
    const len = 3 + hashXY(i, 3, seed) * 12;
    ctx.lineWidth = 0.3 + hashXY(i, 4, seed) * 1.0;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(hx + Math.cos(angle) * len, hy + Math.sin(angle) * len);
    ctx.stroke();
  }
}

function squiggleTexture(ctx, x, y, w, h, count, color, seed) {
  ctx.strokeStyle = color;
  ctx.lineCap = 'round';
  ctx.lineWidth = 0.35;
  for (let i = 0; i < count; i++) {
    const sx = x + hashXY(i, 0, seed) * w;
    const sy = y + hashXY(i, 1, seed) * h;
    if (sx < x || sx > x + w || sy < y || sy > y + h) continue;
    const startAngle = hashXY(i, 2, seed) * Math.PI * 2;
    const arcLen = 0.2 + hashXY(i, 3, seed) * 1.5;
    const radius = 1.2 + hashXY(i, 4, seed) * 3.5;
    ctx.beginPath();
    ctx.arc(sx, sy, radius, startAngle, startAngle + arcLen);
    ctx.stroke();
  }
}

function drawWoodHeader(ctx, x, y, w, h, seed) {
  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, 6, 0.022, seed);
  const hGrad = ctx.createLinearGradient(x, y, x, y + h);
  hGrad.addColorStop(0, '#7A4E2A');
  hGrad.addColorStop(0.5, '#5C3516');
  hGrad.addColorStop(1, '#43250A');
  ctx.fillStyle = hGrad;
  ctx.fill();

  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, 6, 0.022, seed);
  ctx.clip();
  ctx.strokeStyle = 'rgba(90,55,25,0.22)';
  ctx.lineCap = 'round';
  for (let i = 0; i < 35; i++) {
    const gx = x + hashXY(i, 0, seed + 930) * w;
    const gy = y + hashXY(i, 1, seed + 930) * h;
    const glen = 8 + hashXY(i, 2, seed + 930) * 18;
    ctx.lineWidth = 0.4 + hashXY(i, 3, seed + 930) * 1.1;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + glen * 0.6, gy + (hashXY(i, 4, seed + 930) - 0.5) * 8);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, 6, 0.022, seed);
  ctx.clip();
  speckleNoise(ctx, x, y, w, h, Math.floor(w * h * 0.04), 'rgba(20,10,3,A)', [0.04, 0.18], seed + 940);
  ctx.restore();

  wobblyRoundRect(ctx, x, y, w, h, 6, 0.022, seed);
  handStroke(ctx, 'rgba(30,12,3,0.70)', 2.0, 2, 1.2, seed + 950);
  ctx.restore();
}

function drawStatCard(ctx, x, y, w, h, icon, label, value, color, seed) {
  // Only draws decorative card background — HTML overlay handles all text
  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, 5, 0.024, seed);
  const cardGrad = ctx.createLinearGradient(x, y, x, y + h);
  cardGrad.addColorStop(0, '#FDFBD0');
  cardGrad.addColorStop(1, '#F2EAA0');
  ctx.fillStyle = cardGrad;
  ctx.fill();

  wobblyRoundRect(ctx, x, y, w, h, 5, 0.024, seed);
  ctx.strokeStyle = 'rgba(60,30,10,0.55)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Subtle inner speckle for parchment texture
  speckleNoise(ctx, x + 2, y + 2, w - 4, h - 4,
    Math.floor(w * h * 0.02), 'rgba(180,150,100,A)', [0.02, 0.08], seed + 870);
  ctx.restore();
}

function drawGrainProgressBar(ctx, x, y, w, h, fillRatio, seed) {
  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, h * 0.45, 0.026, seed);

  const grooveGrad = ctx.createLinearGradient(x, y, x, y + h);
  grooveGrad.addColorStop(0, 'rgba(50,25,10,0.55)');
  grooveGrad.addColorStop(0.5, 'rgba(35,15,5,0.65)');
  grooveGrad.addColorStop(1, 'rgba(45,20,8,0.50)');
  ctx.fillStyle = grooveGrad;
  ctx.fill();

  wobblyRoundRect(ctx, x + 1.5, y + 1, w - 3, h * 0.5, h * 0.4, 0.028, seed + 10);
  ctx.strokeStyle = 'rgba(15,5,2,0.35)';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  if (fillRatio > 0.01) {
    ctx.save();
    wobblyRoundRect(ctx, x + 2, y + 2, w - 4, h - 4, (h - 4) * 0.42, 0.026, seed);
    ctx.clip();

    const fillW = (w - h * 0.3) * fillRatio;
    const fillX = x + h * 0.12;
    const fillY = y + h * 0.12;
    const fillH = h * 0.76;

    wobblyRoundRect(ctx, fillX, fillY, Math.max(fillW, h * 0.15), fillH, fillH * 0.4, 0.030, seed + 800);

    const fillGrad = ctx.createLinearGradient(fillX, fillY, fillX, fillY + fillH);
    fillGrad.addColorStop(0, PALETTE.goldLight);
    fillGrad.addColorStop(0.35, PALETTE.gold);
    fillGrad.addColorStop(0.7, PALETTE.goldDark);
    fillGrad.addColorStop(1, '#A88920');
    ctx.fillStyle = fillGrad;
    ctx.fill();

    const hlGrad = ctx.createLinearGradient(fillX, fillY, fillX, fillY + fillH * 0.5);
    hlGrad.addColorStop(0, 'rgba(255,255,200,0.30)');
    hlGrad.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = hlGrad;
    ctx.fill();

    speckleNoise(ctx, fillX, fillY, Math.max(fillW, h * 0.15), fillH,
      Math.floor(fillW * fillH * 0.06), 'rgba(255,255,180,A)', [0.08, 0.22], seed + 810);

    ctx.restore();
  }

  wobblyRoundRect(ctx, x, y, w, h, h * 0.45, 0.026, seed);
  handStroke(ctx, 'rgba(40,18,8,0.60)', 1.4, 2, 1.0, seed + 820);
  ctx.restore();
}

function drawButton(ctx, x, y, w, h, text, type, seed) {
  // Only draws decorative button background — HTML overlay handles all text
  ctx.save();
  const br = h * 0.42;

  wobblyRoundRect(ctx, x, y, w, h, br, 0.024, seed);

  let bgGrad;
  switch (type) {
    case 'primary':
      bgGrad = ctx.createLinearGradient(x, y, x, y + h);
      bgGrad.addColorStop(0, PALETTE.goldLight);
      bgGrad.addColorStop(0.5, PALETTE.gold);
      bgGrad.addColorStop(1, PALETTE.goldDark);
      break;
    case 'secondary':
      bgGrad = ctx.createLinearGradient(x, y, x, y + h);
      bgGrad.addColorStop(0, '#FDFBDA');
      bgGrad.addColorStop(1, '#EBE0A0');
      break;
    case 'ghost':
      bgGrad = ctx.createLinearGradient(x, y, x, y + h);
      bgGrad.addColorStop(0, 'rgba(255,255,240,0.22)');
      bgGrad.addColorStop(1, 'rgba(240,230,200,0.12)');
      break;
    case 'locked':
      bgGrad = 'rgba(160,140,110,0.30)';
      break;
    default:
      bgGrad = PALETTE.parchment;
  }
  ctx.fillStyle = bgGrad;
  ctx.fill();

  ctx.save();
  wobblyRoundRect(ctx, x, y, w, h, br, 0.024, seed);
  ctx.clip();
  handHatch(ctx, x, y, w, h, Math.floor(w * h * 0.018), 'rgba(0,0,0,0.05)', seed + 830);
  if (type === 'primary') {
    speckleNoise(ctx, x, y, w, h, Math.floor(w * h * 0.03), 'rgba(255,255,180,A)', [0.06, 0.16], seed + 840);
  }
  ctx.restore();

  wobblyRoundRect(ctx, x, y, w, h, br, 0.024, seed);
  const strokeAlpha = type === 'ghost' ? '0.45' : '0.60';
  handStroke(ctx, 'rgba(60,30,12,' + strokeAlpha + ')', 1.8, 2, 0.8, seed + 850);
  ctx.restore();
}

function drawInfoLabel(ctx, x, y, w, h, icon, text, seed) {
  // Only draws decorative label background — HTML overlay handles all text
  ctx.save();
  const lr = h * 0.30;
  wobblyRoundRect(ctx, x, y, w, h, lr, 0.022, seed);

  const labelGrad = ctx.createLinearGradient(x, y, x, y + h);
  labelGrad.addColorStop(0, '#6B3D23');
  labelGrad.addColorStop(1, '#4A2510');
  ctx.fillStyle = labelGrad;
  ctx.fill();

  wobblyRoundRect(ctx, x, y, w, h, lr, 0.022, seed);
  handStroke(ctx, 'rgba(30,12,3,0.65)', 1.6, 2, 0.8, seed + 880);
  ctx.restore();
}

const preloaderText = document.getElementById('preloader-text');
const preloaderScreen = document.getElementById('preloader');

function updatePreloaderProgress() {
  const pct = Math.round((preloadDone / preloadTotal) * 100);
  if (preloaderBar) preloaderBar.style.width = pct + '%';
  if (preloaderText) preloaderText.textContent = '正在加载素材... ' + pct + '%';
}

PRELOAD_IMAGES.forEach((item) => {
  const img = new Image();
  img.onload = () => {
    preloadDone++;
    loadedImages[item.key] = img;
    updatePreloaderProgress();
    console.log('Loaded: ' + item.src + ' (' + preloadDone + '/' + preloadTotal + ')');
    if (preloadDone >= preloadTotal) {
      onAllImagesReady();
    }
  };
  img.onerror = () => {
    preloadDone++;
    console.warn('Failed to load: ' + item.src);
    updatePreloaderProgress();
    if (preloadDone >= preloadTotal) {
      onAllImagesReady();
    }
  };
  img.src = item.src;
  // Belt-and-suspenders: cached images
  if (img.complete && img.naturalWidth > 0) {
    preloadDone++;
    loadedImages[item.key] = img;
    updatePreloaderProgress();
    if (preloadDone >= preloadTotal) {
      onAllImagesReady();
    }
  }
});

function onAllImagesReady() {
  if (preloadAllReady) return;
  preloadAllReady = true;
  console.log('All images loaded — starting game');

  // Populate legacy references for backward compatibility
  boardBgImage = loadedImages['qipan'] || null;
  boardBgReady = !!loadedImages['qipan'];
  beijingImage = loadedImages['beijing'] || null;

  // Build blockImages map
  PRELOAD_IMAGES.filter(i => i.type === 'block').forEach((item) => {
    if (loadedImages[item.key]) {
      blockImages[item.blockType] = loadedImages[item.key];
    }
  });
  blockImagesReady = true;

  // Apply beijing background
  if (loadedImages['beijing']) {
    document.body.style.backgroundImage = "url('" + loadedImages['beijing'].src + "')";
  }

  // Wait a brief moment for the progress bar to show 100%, then transition
  setTimeout(() => {
    if (preloaderScreen) {
      preloaderScreen.classList.add('hidden');
    }
    startGame();
  }, 400);
}

function resizeUICanvases() {
  const uiCanvases = [
    { el: topCanvas, ctx: topCtx, parentId: 'top-bar' },
    { el: levelCanvas, ctx: levelCtx, parentId: 'level-selector' },
    { el: legendCanvas, ctx: legendCtx, parentId: 'block-legend' },
    { el: bottomCanvas, ctx: bottomCtx, parentId: 'bottom-bar' },
  ];
  for (const uc of uiCanvases) {
    if (!uc.el || !uc.ctx) continue;
    const parent = document.getElementById(uc.parentId);
    if (!parent) continue;
    const w = parent.offsetWidth || uc.el.offsetWidth || 300;
    const h = parent.offsetHeight || uc.el.offsetHeight || 36;
    if (w <= 0 || h <= 0) continue;
    // Use 1:1 pixel mapping — simpler, matches test_ui_reserve behavior
    // UI canvases don't need DPR scaling since they're decorative
    if (uc.el.width !== w || uc.el.height !== h) {
      uc.el.width = w;
      uc.el.height = h;
      uc.el.style.width = w + 'px';
      uc.el.style.height = h + 'px';
      uc.ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
  }
}

function buildBlockLegend(levelNum) {
  const cfg = LEVELS[levelNum - 1] || LEVELS[0];
  const blockTypes = [...(cfg.pollutants || [])];
  if (!blockTypes.includes(BLOCK.LOOSE_SOIL)) blockTypes.push(BLOCK.LOOSE_SOIL);
  if (!blockTypes.includes(BLOCK.HEALTHY_FARM)) blockTypes.push(BLOCK.HEALTHY_FARM);

  const row = document.getElementById('legend-row');
  if (!row) return;
  row.innerHTML = '';

  blockTypes.forEach(type => {
    const name = BLOCK_NAMES[type] || '未知';
    const desc = BLOCK_DESC[type] || '';
    const img = blockImages[type];

    const item = document.createElement('div');
    item.className = 'legend-item';

    const iconWrap = document.createElement('div');
    iconWrap.className = 'legend-icon-wrap';
    const cv = document.createElement('canvas');
    cv.width = 76; cv.height = 76;
    cv.style.width = '38px'; cv.style.height = '38px';
    iconWrap.appendChild(cv);
    if (img && img.complete) {
      const ctx = cv.getContext('2d');
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, 76, 76);
    } else if (img) {
      img.addEventListener('load', () => {
        const ctx = cv.getContext('2d');
        const s = Math.min(img.width, img.height);
        const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
        ctx.drawImage(img, sx, sy, s, s, 0, 0, 76, 76);
      }, { once: true });
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'legend-name';
    nameSpan.textContent = name;

    item.appendChild(iconWrap);
    item.appendChild(nameSpan);
    item.addEventListener('click', () => showBlockPopup(type, name, desc));
    row.appendChild(item);
  });
}

// --- Block Drawing Functions ---
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawBlock(x, y, size, type, r, c, scaleOverride) {
  if (!BLOCK_COLORS[type]) return;
  const pad = Math.max(1, Math.floor(size * 0.06));
  const inner = size - pad * 2;
  const br = Math.max(2, size * 0.12);

  // Compute bounce scale (game animation — preserved)
  let bounceScale = scaleOverride || 1;
  const key = animCellKey(r, c);
  const bounce = animState.bounces[key];
  if (bounce) {
    const elapsed = performance.now() - bounce.startTime;
    const duration = 400;
    if (elapsed > duration) {
      delete animState.bounces[key];
    } else {
      const t = elapsed / duration;
      bounceScale = 1 + bounce.intensity * 0.18 * Math.sin(t * Math.PI * 2.5) * Math.max(0, 1 - t * 1.2);
    }
  }

  ctx.save();

  // Apply bounce scale
  if (bounceScale !== 1) {
    const cx = x + size / 2;
    const cy = y + size / 2;
    ctx.translate(cx, cy);
    ctx.scale(bounceScale, bounceScale);
    ctx.translate(-cx, -cy);
  }

  // Shadow (subtle depth)
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = size * 0.05;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;

  // Draw PNG block image (with rounded-rect clip for clean edges)
  const img = blockImages[type];
  if (img && img.complete && img.naturalWidth > 0) {
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.save();
    ctx.clip();
    ctx.drawImage(img, x + pad, y + pad, inner, inner);
    ctx.restore();
  } else {
    // Fallback: simple colored rounded rect while image loads
    const colors = BLOCK_COLORS[type];
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.fillStyle = colors.fill;
    ctx.fill();
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = Math.max(0.8, size * 0.025);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  ctx.restore();
}

function drawBoard(board, highlightCells = null) {
  const size = board.length;
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasLogicalSize, canvasLogicalSize);

  const boardW = size * cellSize;
  const boardH = size * cellSize;
  const M = boardMargin;  // shorthand for frame width

  // ═══════════════════════════════════════════════
  // 1. BOARD FLOOR BACKGROUND (image replaces wood frame + parchment)
  // ═══════════════════════════════════════════════
  if (boardBgReady) {
    ctx.drawImage(boardBgImage, 0, 0, canvasLogicalSize, canvasLogicalSize);
  } else {
    // Fallback: placeholder while image loads (lighter tone — clearly different from old wood frame)
    const fallbackGrad = ctx.createLinearGradient(0, 0, 0, canvasLogicalSize);
    fallbackGrad.addColorStop(0, '#8B7355');
    fallbackGrad.addColorStop(1, '#6B5540');
    ctx.fillStyle = fallbackGrad;
    ctx.fillRect(0, 0, canvasLogicalSize, canvasLogicalSize);
  }

  // ═══════════════════════════════════════════════
  // 2. CELL BACKGROUNDS (nearly transparent — floor image shows through)
  // ═══════════════════════════════════════════════
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cellX = M + c * cellSize;
      const cellY = M + r * cellSize;
      const cellPad = cellSize * 0.07;
      const cellInner = cellSize - cellPad * 2;
      const cellSeed = 8500 + r * 20 + c;

      wobblyRoundRect(ctx, cellX + cellPad, cellY + cellPad, cellInner, cellInner, cellInner * 0.10, 0.028, cellSeed);

      // Very faint cell fill — barely visible, lets floor image dominate
      const cellGrad = ctx.createLinearGradient(cellX + cellPad, cellY + cellPad, cellX + cellPad, cellY + cellPad + cellInner);
      cellGrad.addColorStop(0, 'rgba(255,253,235,0.08)');
      cellGrad.addColorStop(0.5, 'rgba(248,242,215,0.04)');
      cellGrad.addColorStop(1, 'rgba(238,228,195,0.06)');
      ctx.fillStyle = cellGrad;
      ctx.fill();

      // Cell border (thin, wobbly) — grid lines
      ctx.strokeStyle = 'rgba(80,65,45,0.30)';
      ctx.lineWidth = 0.6 + hashXY(cellSeed, 0, 870) * 0.4;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Subtle inner shadow for depth
      wobblyRoundRect(ctx, cellX + cellPad + 1.2, cellY + cellPad + 0.8, cellInner - 2.4, cellInner - 1.6, cellInner * 0.09, 0.030, cellSeed + 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Build drop & skip maps from animation state
  const dropMap = {};
  const skipCells = new Set();
  if (animState.elim) {
    for (const cell of animState.elim.cells) {
      skipCells.add(animCellKey(cell.r, cell.c));
    }
  }
  // Also skip cells being swapped — their backgrounds already show, blocks drawn at interpolated pos
  if (animState.swap) {
    skipCells.add(animCellKey(animState.swap.r1, animState.swap.c1));
    skipCells.add(animCellKey(animState.swap.r2, animState.swap.c2));
  }
  if (animState.drops) {
    const t = animState.drops.progress || 0;
    const ease = easeOutBack(t);
    for (const d of animState.drops.items) {
      const currentR = d.fromR + (d.toR - d.fromR) * ease;
      dropMap[animCellKey(d.toR, d.c)] = { currentR, type: d.type };
      // Skip drawing at the FROM position (it's moving)
      if (d.fromR >= 0) skipCells.add(animCellKey(d.fromR, d.c));
    }
  }

  // Draw blocks
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const key = animCellKey(r, c);
      if (skipCells.has(key)) continue;

      if (dropMap[key]) {
        // Currently dropping — draw at interpolated position
        drawBlock(M + c * cellSize, M + dropMap[key].currentR * cellSize, cellSize, dropMap[key].type, r, c);
      } else if (board[r][c]) {
        drawBlock(M + c * cellSize, M + r * cellSize, cellSize, board[r][c], r, c);
      }
    }
  }

  // Draw swap animation overlay
  if (animState.swap) {
    const s = animState.swap;
    const elapsed = performance.now() - s.startTime;
    const t = Math.min(1, elapsed / s.duration);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    const x1 = M + s.c1 * cellSize, y1 = M + s.r1 * cellSize;
    const x2 = M + s.c2 * cellSize, y2 = M + s.r2 * cellSize;
    const px1 = x1 + (x2 - x1) * ease;
    const py1 = y1 + (y2 - y1) * ease;
    const px2 = x2 + (x1 - x2) * ease;
    const py2 = y2 + (y1 - y2) * ease;
    // Cell backgrounds already drawn — just draw swapped blocks at interpolated positions
    drawBlock(px1, py1, cellSize, board[s.r1][s.c1], s.r1, s.c1);
    drawBlock(px2, py2, cellSize, board[s.r2][s.c2], s.r2, s.c2);
  }

  // Draw elimination glow
  if (animState.elim) {
    const t = Math.min(1, (performance.now() - animState.elim.startTime) / animState.elim.duration);
    for (const cell of animState.elim.cells) {
      const cx = M + cell.c * cellSize + cellSize / 2;
      const cy = M + cell.r * cellSize + cellSize / 2;
      const alpha = Math.max(0, 1 - t);
      const glowR = cellSize * 0.45 * (1 + t * 0.5);
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = '#FFFBE6';
      ctx.shadowColor = 'rgba(255,200,0,0.8)';
      ctx.shadowBlur = cellSize * 0.25;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawBlock(M + cell.c * cellSize, M + cell.r * cellSize, cellSize, cell.type, cell.r, cell.c, 1 + t * 0.35);
    }
  }

  // Highlight cells
  if (highlightCells) {
    for (const { r, c } of highlightCells) {
      ctx.strokeStyle = '#E1CB6B';
      ctx.lineWidth = Math.max(2, cellSize * 0.06);
      ctx.strokeRect(M + c * cellSize + 2, M + r * cellSize + 2, cellSize - 4, cellSize - 4);
    }
  }

  // Tutorial highlight overlay
  if (typeof tutorialSystem !== 'undefined') {
    tutorialSystem.renderHighlights(ctx);
  }
}

// --- Particle System ---
let particles = [];
let animFrameId = null;

function spawnParticles(cx, cy, count, color, spread, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - spread * 0.3,
      life: life + Math.random() * life * 0.5,
      maxLife: life * 1.5,
      color: color,
      size: 1.5 + Math.random() * 3
    });
  }
}

function spawnElimParticles(cells, color) {
  for (const cell of cells) {
    const cx = boardMargin + cell.c * cellSize + cellSize / 2;
    const cy = boardMargin + cell.r * cellSize + cellSize / 2;
    spawnParticles(cx, cy, 8, color, cellSize * 0.12, 400);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.001 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result
    ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) }
    : { r: 0, g: 0, b: 0 };
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const size = p.size * alpha;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Render loop ---
let renderBoard = null;
let renderHighlights = null;

function hasActiveAnimations() {
  return particles.length > 0 ||
    game.state === 'animating' ||
    animState.swap !== null ||
    animState.elim !== null ||
    animState.drops !== null ||
    Object.keys(animState.bounces).length > 0;
}

function startRenderLoop() {
  if (animFrameId) return;
  let lastTime = performance.now();

  function loop(time) {
    const dt = time - lastTime;
    lastTime = time;

    updateParticles(dt);

    // Clean stale bounces
    const now = performance.now();
    for (const [key, b] of Object.entries(animState.bounces)) {
      if (now - b.startTime > 400) delete animState.bounces[key];
    }

    // Auto-clear stale animation states
    if (animState.elim && now - animState.elim.startTime > animState.elim.duration + 200) {
      animState.elim = null;
    }

    if (renderBoard) {
      drawBoard(renderBoard, renderHighlights);
      drawParticles();
    }

    if (hasActiveAnimations()) {
      animFrameId = requestAnimationFrame(loop);
    } else {
      animFrameId = null;
      // Final render to clean up
      if (renderBoard) {
        drawBoard(renderBoard, renderHighlights);
      }
    }
  }

  animFrameId = requestAnimationFrame(loop);
}

function stopRenderLoop() {
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
}

function triggerRender(board, highlights = null) {
  renderBoard = board;
  renderHighlights = highlights;
  // Draw immediately
  drawBoard(board, highlights);
  drawParticles();
  // Continue loop if animations active
  if (!animFrameId && (particles.length > 0 || game.state === 'animating')) {
    startRenderLoop();
  }
}

// --- Swap Animation ---
// ============================================================
// 8. AUDIO — Web Audio API 音效
// ============================================================
let audioCtx = null;
let muted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTone(freq, duration, type = 'sine', vol = 0.1) {
  if (muted || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol = 0.05) {
  if (muted || !audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * vol * (1 - i / bufferSize);
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);
  source.start();
}

function sfxSwap() { playTone(440, 0.08, 'sine', 0.08); setTimeout(() => playTone(520, 0.06, 'sine', 0.06), 50); }
function sfxMatch() { playNoise(0.15, 0.06); }
function sfxReclaim() { playTone(523, 0.12, 'sine', 0.1); setTimeout(() => playTone(659, 0.12, 'sine', 0.1), 80); setTimeout(() => playTone(784, 0.18, 'sine', 0.12), 160); }
function sfxInvalid() { playTone(120, 0.2, 'triangle', 0.08); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.25, 'sine', 0.12), i * 120));
}
function sfxLose() {
  [400, 350, 300, 200].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.08), i * 150));
}

// ============================================================
// 9. STORAGE — 持久化
// ============================================================
const STORAGE_KEY = 'wotu_progress';
const STORAGE_STATS = 'wotu_stats';

function saveProgress(levelNum) {
  try { localStorage.setItem(STORAGE_KEY, String(levelNum)); } catch(e) {}
}

function loadProgress() {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? Math.min(Number(v), 3) : 1;
  } catch(e) { return 1; }
}

function saveStats(stats) {
  try { localStorage.setItem(STORAGE_STATS, JSON.stringify(stats)); } catch(e) {}
}

function loadStats() {
  try {
    const v = localStorage.getItem(STORAGE_STATS);
    return v ? JSON.parse(v) : { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 };
  } catch(e) { return { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 }; }
}

function resetProgress() {
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_STATS); } catch(e) {}
}

// ============================================================
// 10. GAME CONTROLLER — 游戏状态机
// ============================================================
const STATE = { IDLE: 'idle', SWAPPING: 'swapping', ANIMATING: 'animating', GAME_OVER: 'game_over' };

const game = {
  levelNum: 1,
  board: null,
  stepsLeft: 0,
  grainReserve: 0,
  reclaimedCount: 0,
  target: 0,
  levelConfig: null,
  state: STATE.IDLE,
  selectedCell: null,
  stats: loadStats(),

  initLevel(levelNum) {
    this.levelNum = levelNum;
    this.levelConfig = LEVELS[levelNum - 1];
    const cfg = this.levelConfig;

    this.board = createBoard(cfg.size, cfg.pollutants, cfg.looseSoilInit);
    this.stepsLeft = cfg.steps;
    this.grainReserve = cfg.grainInit;
    this.reclaimedCount = 0;
    this.target = cfg.target;
    this.state = STATE.IDLE;
    this.selectedCell = null;

    resizeCanvas(cfg.size);
    this.render();
    this.updateUI();
    document.getElementById('btn-next').style.display = 'none';
    drawBottomBarCanvas();

    // Clear animation state
    animState.swap = null;
    animState.elim = null;
    animState.drops = null;
    animState.bounces = {};
    clearFirstTap();
    updateLevelSelector();
    buildBlockLegend(levelNum);

    if (cfg.intro) {
      showLevelIntro(cfg.intro, cfg.hasGuide ? () => guideSystem.start() : null);
    } else if (cfg.hasGuide) {
      guideSystem.start();
    }
  },

  render(highlightCells = null) {
    triggerRender(this.board, highlightCells);
  },

  updateUI() {
    const cfg = this.levelConfig;
    document.getElementById('level-name').textContent = cfg.name;
    document.getElementById('reclaim-progress').textContent = this.reclaimedCount + '/' + this.target;
    document.getElementById('steps-left').textContent = this.stepsLeft;

    // Grain bar
    const grainPercent = Math.max(0, this.grainReserve);
    const grainBar = document.getElementById('grain-bar-inner');
    grainBar.style.width = grainPercent + '%';
    document.getElementById('grain-bar-label').textContent = '粮食 ' + Math.round(grainPercent) + '%';

    // Color warning when low
    if (grainPercent <= 20) {
      grainBar.style.background = 'linear-gradient(180deg, #FF5252 0%, #E53935 50%, #C62828 100%)';
    } else if (grainPercent <= 40) {
      grainBar.style.background = 'linear-gradient(180deg, #F0DC82 0%, #E1CB6B 50%, #C4A840 100%)';
    } else {
      grainBar.style.background = 'linear-gradient(180deg, #F0DC82 0%, #E1CB6B 35%, #C4A840 70%, #A88920 100%)';
    }

    // Steps warning
    const stepsEl = document.getElementById('steps-left');
    if (this.stepsLeft <= 3) {
      stepsEl.style.color = '#FF5252';
    } else if (this.stepsLeft <= 6) {
      stepsEl.style.color = '#F0DC82';
    } else {
      stepsEl.style.color = '#F0DC82';
    }

    // Redraw hand-drawn top bar canvas
    drawTopBarCanvas();
  },

  async handleSwap(r1, c1, r2, c2) {
    if (this.state !== STATE.IDLE) return;
    if (!isAdjacent(r1, c1, r2, c2)) return;

    // Tutorial check: if tutorial is active, verify this is the correct swap
    if (typeof tutorialSystem !== 'undefined' && tutorialSystem.waitingForSwap) {
      if (!isSameSwap(tutorialSystem.targetCells, r1, c1, r2, c2)) {
        // Wrong swap — block it, show hint shake
        const tooltip = document.getElementById('guide-tooltip');
        if (tooltip) {
          tooltip.style.animation = 'none';
          tooltip.offsetHeight;
          tooltip.style.animation = 'tutorialShake 0.4s ease';
        }
        return;
      }
      tutorialSystem.waitingForSwap = false;
      document.getElementById('guide-backdrop').classList.remove('active');
      document.getElementById('guide-tooltip').style.display = 'none';
    }

    initAudio();
    this.state = STATE.SWAPPING;

    // Animate swap
    animState.swap = { r1, c1, r2, c2, startTime: performance.now(), duration: 280 };
    startRenderLoop();
    sfxSwap();

    // Execute board swap
    const originalBoard = cloneBoard(this.board);
    const tmp = this.board[r1][c1];
    this.board[r1][c1] = this.board[r2][c2];
    this.board[r2][c2] = tmp;

    // Wait for swap animation
    await new Promise(resolve => setTimeout(resolve, 280));
    animState.swap = null;

    // Add bounce to swapped cells
    addBounce(r1, c1, 0.7);
    addBounce(r2, c2, 0.7);

    // Check for matches
    const { matchGroups } = findAllMatches(this.board);

    if (matchGroups.length === 0) {
      // Invalid move — revert
      this.board = originalBoard;
      this.stepsLeft--;
      this.grainReserve = Math.max(0, this.grainReserve - this.levelConfig.grainPenalty);
      sfxInvalid();
      this.render();
      this.updateUI();

      if (this.checkLose()) return;
      this.state = STATE.IDLE;
      guideSystem.onInvalidMove();
      return;
    }

    // Valid move
    this.stepsLeft--;
    this.render();
    this.updateUI();

    await this.processChain(matchGroups);
  },

  async processChain(matchGroups) {
    this.state = STATE.ANIMATING;

    // Collect all cells being eliminated
    const allCells = [];
    for (const match of matchGroups) {
      for (const cell of match.cells) {
        allCells.push({ r: cell.r, c: cell.c, type: this.board[cell.r][cell.c] });
      }
    }

    // --- Elimination animation ---
    animState.elim = { cells: allCells, startTime: performance.now(), duration: 380 };
    startRenderLoop();

    // Spawn particles during elimination
    for (const match of matchGroups) {
      const blockColor = BLOCK_COLORS[match.type] ? BLOCK_COLORS[match.type].fill : '#8D6E63';
      spawnElimParticles(match.cells, blockColor);
    }

    await new Promise(resolve => setTimeout(resolve, 380));
    animState.elim = null;

    // Process matches
    const result = processMatches(this.board, matchGroups);
    this.board = result.board;
    this.reclaimedCount += result.reclaimedCount;

    const grainGain = result.reclaimedCount * this.levelConfig.grainGain;
    this.grainReserve = Math.min(100, this.grainReserve + grainGain);

    if (result.reclaimedCount > 0) {
      sfxReclaim();
      for (const match of matchGroups) {
        if (match.type === BLOCK.LOOSE_SOIL) {
          const cx = boardMargin + match.cells[1].c * cellSize + cellSize / 2;
          const cy = boardMargin + match.cells[1].r * cellSize + cellSize / 2;
          spawnParticles(cx, cy, 20, '#F0DC82', cellSize * 0.2, 700);
        }
      }
    } else {
      sfxMatch();
    }

    this.render();
    this.updateUI();

    // --- Compute gravity drops ---
    const postGravity = applyGravity(this.board, this.levelConfig.pollutants);
    const size = this.board.length;
    const dropItems = [];

    for (let c = 0; c < size; c++) {
      // Find non-null cells in current board, bottom to top
      const oldBlocks = [];
      for (let r = size - 1; r >= 0; r--) {
        if (this.board[r][c] !== null) {
          oldBlocks.push({ r, type: this.board[r][c] });
        }
      }
      // Find non-null cells in post-gravity board, bottom to top
      const newBlocks = [];
      for (let r = size - 1; r >= 0; r--) {
        if (postGravity[r][c] !== null) {
          newBlocks.push({ r, type: postGravity[r][c] });
        }
      }
      // Map old blocks to new positions
      for (let i = 0; i < oldBlocks.length && i < newBlocks.length; i++) {
        if (oldBlocks[i].r !== newBlocks[i].r) {
          dropItems.push({
            c,
            fromR: oldBlocks[i].r,
            toR: newBlocks[i].r,
            type: newBlocks[i].type
          });
        }
      }
      // New blocks from top (spawned)
      for (let i = oldBlocks.length; i < newBlocks.length; i++) {
        dropItems.push({
          c,
          fromR: -1 - (i - oldBlocks.length),
          toR: newBlocks[i].r,
          type: newBlocks[i].type
        });
      }
    }

    // --- Gravity drop animation ---
    if (dropItems.length > 0) {
      const dropDuration = Math.min(600, 200 + dropItems.length * 15);
      animState.drops = { items: dropItems, startTime: performance.now(), duration: dropDuration, progress: 0 };

      await animateOver(dropDuration, (t) => {
        if (animState.drops) animState.drops.progress = t;
        this.render(); // re-render each frame
      });

      animState.drops = null;

      // Add bounce to settled cells
      for (const d of dropItems) {
        addBounce(d.toR, d.c, 0.5);
        // Only bounce a few cells to avoid overwhelming
        if (dropItems.length > 8) break;
      }
    }

    // Update board to post-gravity state
    this.board = postGravity;
    this.render();

    // --- Check chain ---
    const { matchGroups: newMatches } = findAllMatches(this.board);

    if (newMatches.length > 0) {
      await this.processChain(newMatches);
    } else {
      if (this.checkWin()) return;
      if (this.checkLose()) return;
      this.state = STATE.IDLE;
      this.render();
      guideSystem.onIdle();
    }
  },

  checkWin() {
    if (this.reclaimedCount >= this.target) {
      this.state = STATE.GAME_OVER;
      sfxWin();

      // Update stats
      this.stats.levelsCleared = Math.max(this.stats.levelsCleared, this.levelNum);
      this.stats.totalFarmland += this.reclaimedCount;
      this.stats.grainSaved += Math.round(this.grainReserve);
      saveStats(this.stats);

      if (this.levelNum < 3) {
        saveProgress(this.levelNum + 1);
      } else {
        // All levels cleared
        saveProgress(3);
        saveStats(this.stats);
      }

      setTimeout(() => showPopup('win'), 400);
      return true;
    }
    return false;
  },

  checkLose() {
    if (this.stepsLeft <= 0) {
      this.state = STATE.GAME_OVER;
      sfxLose();
      setTimeout(() => showPopup('lose', '步数耗尽！土地修复的窗口期已过，请重新规划。'), 400);
      return true;
    }
    if (this.grainReserve <= 0) {
      this.state = STATE.GAME_OVER;
      sfxLose();
      setTimeout(() => showPopup('lose', '粮食储备归零！没有足够的粮食支撑修复工作，请重新开始。'), 400);
      return true;
    }
    return false;
  },

  nextLevel() {
    if (this.levelNum < 3) {
      this.initLevel(this.levelNum + 1);
    } else {
      showSummary();
    }
  },

  restartLevel() {
    this.initLevel(this.levelNum);
  },

  restartAll() {
    resetProgress();
    this.stats = { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 };
    this.initLevel(1);
  }
};

// ============================================================
// 11. INPUT HANDLER — 触屏 + 鼠标输入 (click-to-swap + drag)
// ============================================================
let touchStartX = 0, touchStartY = 0;
let touchStartCell = null;
let hasDragged = false;
let firstTapCell = null;   // For two-tap swap

function getCellFromClient(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasLogicalSize / rect.width;
  const scaleY = canvasLogicalSize / rect.height;
  const col = Math.floor(((clientX - rect.left) * scaleX - boardMargin) / cellSize);
  const row = Math.floor(((clientY - rect.top) * scaleY - boardMargin) / cellSize);
  if (row >= 0 && row < game.board.length && col >= 0 && col < game.board[0].length) {
    return { r: row, c: col };
  }
  return null;
}

function clearFirstTap() {
  firstTapCell = null;
  game.render();
}

function handlePointerDown(clientX, clientY) {
  if (game.state !== STATE.IDLE) return;
  initAudio();
  const cell = getCellFromClient(clientX, clientY);
  if (!cell) {
    clearFirstTap();
    return;
  }

  touchStartX = clientX;
  touchStartY = clientY;
  touchStartCell = cell;
  hasDragged = false;

  // Two-tap swap: if we already have a first tap, check adjacency
  if (firstTapCell) {
    if (firstTapCell.r === cell.r && firstTapCell.c === cell.c) {
      // Same cell — deselect
      clearFirstTap();
      return;
    }
    if (isAdjacent(firstTapCell.r, firstTapCell.c, cell.r, cell.c)) {
      // Adjacent — swap!
      game.handleSwap(firstTapCell.r, firstTapCell.c, cell.r, cell.c);
      clearFirstTap();
      touchStartCell = null;
      return;
    }
    // Non-adjacent — select new cell instead
  }

  // Select cell
  firstTapCell = cell;
  game.selectedCell = cell;
  game.render([cell]);
  addBounce(cell.r, cell.c, 1.0);
}

function handlePointerMove(clientX, clientY) {
  if (!touchStartCell || game.state !== STATE.IDLE) return;
  const dx = clientX - touchStartX;
  const dy = clientY - touchStartY;
  const threshold = cellSize * 0.25;

  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    hasDragged = true;
    clearFirstTap();

    let targetCell = null;
    if (Math.abs(dx) > Math.abs(dy)) {
      targetCell = { r: touchStartCell.r, c: touchStartCell.c + (dx > 0 ? 1 : -1) };
    } else {
      targetCell = { r: touchStartCell.r + (dy > 0 ? 1 : -1), c: touchStartCell.c };
    }

    if (targetCell && targetCell.r >= 0 && targetCell.r < game.board.length &&
        targetCell.c >= 0 && targetCell.c < game.board[0].length) {
      game.render([touchStartCell, targetCell]);
      game.handleSwap(touchStartCell.r, touchStartCell.c, targetCell.r, targetCell.c);
      touchStartCell = null;
      game.selectedCell = null;
    }
  }
}

function handlePointerUp() {
  // If it was a simple tap (no drag), keep the selection
  if (!hasDragged && touchStartCell) {
    game.selectedCell = null;
    game.render(firstTapCell ? [firstTapCell] : null);
  }
  touchStartCell = null;
}

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handlePointerDown(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  handlePointerUp();
});

// Mouse events (desktop support)
canvas.addEventListener('mousedown', (e) => {
  handlePointerDown(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', (e) => {
  if (touchStartCell && !hasDragged) {
    handlePointerMove(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mouseup', (e) => {
  handlePointerUp();
});

canvas.addEventListener('mouseleave', (e) => {
  if (touchStartCell && !hasDragged) {
    game.selectedCell = null;
    game.render();
  }
  touchStartCell = null;
  clearFirstTap();
});

// Prevent context menu on long press
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// 13a. Block Preview Helper — Canvas 方块缩略图
// ============================================================
function renderBlockPreviews(container, types, highlightType) {
  const previewSize = 44;
  const gap = 8;
  const totalW = types.length * previewSize + (types.length - 1) * gap;
  container.innerHTML = '<canvas width="' + totalW + '" height="' + (previewSize + 22) + '" style="display:block;margin:0 auto;"></canvas>';
  const cvs = container.querySelector('canvas');
  if (!cvs) return;
  const pctx = cvs.getContext('2d');
  types.forEach(function(t, i) {
    var x = i * (previewSize + gap);
    drawBlockPreview(pctx, x, 0, previewSize, t.type);
    pctx.fillStyle = t.type === highlightType ? '#F0DC82' : '#FDF8D0';
    pctx.font = 'bold 10px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    pctx.textAlign = 'center';
    pctx.fillText(t.label, x + previewSize / 2, previewSize + 14);
    if (t.type === highlightType) {
      pctx.strokeStyle = '#E1CB6B';
      pctx.lineWidth = 2;
      pctx.setLineDash([3, 2]);
      pctx.strokeRect(x - 1, -1, previewSize + 2, previewSize + 2);
      pctx.setLineDash([]);
      pctx.fillStyle = '#FF6F00';
      pctx.font = 'bold 8px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      pctx.fillText('NEW', x + previewSize / 2, -4);
    }
  });
}

function drawBlockPreview(pctx, x, y, size, type) {
  var ctx = pctx;
  if (!BLOCK_COLORS[type]) return;
  var pad = Math.max(1, Math.floor(size * 0.06));
  var inner = size - pad * 2;
  var br = Math.max(2, size * 0.12);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = size * 0.05;
  ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;

  // Draw PNG block image (with rounded-rect clip for clean edges)
  var img = blockImages[type];
  if (img && img.complete && img.naturalWidth > 0) {
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.save();
    ctx.clip();
    ctx.drawImage(img, x + pad, y + pad, inner, inner);
    ctx.restore();
  } else {
    // Fallback: simple colored rounded rect while image loads
    var colors = BLOCK_COLORS[type];
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.fillStyle = colors.fill;
    ctx.fill();
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = Math.max(1, size * 0.03);
    ctx.stroke();
  }

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  ctx.restore();
}

function roundRectCtx(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

  next() {
    clearTimeout(this.timer);
    this.stepIdx++;
    if (this.stepIdx >= this.steps.length) {
      this.finish();
      return;
    }
    this.show(this.stepIdx);
  },

  show(idx) {
    const step = this.steps[idx];
    const el = document.getElementById(step.target);
    if (!el) { this.next(); return; }

    let innerHTML = '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">' +
