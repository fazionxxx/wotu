let boardRenderSize = 6;
let boardMargin = 0;  // dark wood frame width around the board

function resizeCanvas(boardSize) {
  const maxWidth = Math.min(window.innerWidth - 24, 480) - 16;
  boardMargin = Math.floor(maxWidth * 0.11);
  cellSize = Math.floor((maxWidth - boardMargin * 2) / boardSize);
  const cs = cellSize * boardSize + boardMargin * 2;
  canvasLogicalSize = cs;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.floor(cs * dpr);
  canvas.height = Math.floor(cs * dpr);
  canvas.style.width = cs + 'px';
  canvas.style.height = cs + 'px';
  boardRenderSize = boardSize;
}

// --- Block Drawing Functions ---
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawFence(x, y, size) {
  // Wooden fence border around healthy farmland tiles.
  // Focuses on filling the inter-tile gap, barely intruding into the icon.
  // #8B5A2B, 3px lines, 10px spacing (sparse), 0.85 opacity.
  const pad = Math.max(1, Math.floor(size * 0.06));
  const inner = size - pad * 2;
  const br = Math.max(2, size * 0.12);
  const fenceSpacing = 10;          // sparse: 10px between bars

  // outerOff=0: fence reaches cell boundary, fully filling the pad gap between tiles
  // innerOff=pad+3: fence stops just 3px inside the tile, barely overlapping the icon
  const outerOff = 0;
  const innerOff = pad + 3;

  ctx.save();

  // Clip to cover from cell boundary (gap-filling) to inner fence edge
  ctx.beginPath();
  roundRect(x + outerOff, y + outerOff, size - outerOff * 2, size - outerOff * 2, br + 2);
  ctx.clip();

  ctx.globalAlpha = 0.85;
  ctx.strokeStyle = '#8B5A2B';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  const xOut = x + outerOff;
  const yOut = y + outerOff;
  const xIn = x + innerOff;
  const yIn = y + innerOff;
  const xOutR = x + size - outerOff;
  const yOutB = y + size - outerOff;
  const xInR = x + size - innerOff;
  const yInB = y + size - innerOff;

  // ── Top edge: short vertical pickets spanning the gap+pad zone ──
  for (let dx = xIn; dx <= xInR; dx += fenceSpacing) {
    ctx.beginPath();
    ctx.moveTo(dx, yOut);
    ctx.lineTo(dx, yIn);
    ctx.stroke();
  }
  // Top rail
  ctx.beginPath();
  ctx.moveTo(xOut, yIn - 1.5);
  ctx.lineTo(xOutR, yIn - 1.5);
  ctx.stroke();

  // ── Bottom edge ──
  for (let dx = xIn; dx <= xInR; dx += fenceSpacing) {
    ctx.beginPath();
    ctx.moveTo(dx, yInB);
    ctx.lineTo(dx, yOutB);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(xOut, yInB + 1.5);
  ctx.lineTo(xOutR, yInB + 1.5);
  ctx.stroke();

  // ── Left edge: short horizontal pickets ──
  for (let dy = yIn; dy <= yInB; dy += fenceSpacing) {
    ctx.beginPath();
    ctx.moveTo(xOut, dy);
    ctx.lineTo(xIn, dy);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(xIn - 1.5, yOut);
  ctx.lineTo(xIn - 1.5, yOutB);
  ctx.stroke();

  // ── Right edge ──
  for (let dy = yIn; dy <= yInB; dy += fenceSpacing) {
    ctx.beginPath();
    ctx.moveTo(xInR, dy);
    ctx.lineTo(xOutR, dy);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(xInR + 1.5, yOut);
  ctx.lineTo(xInR + 1.5, yOutB);
  ctx.stroke();

  // ── Steep corner cross-braces (long diagonals across each corner zone) ──
  const diagSpan = innerOff - outerOff;
  // Top-left: steep diagonal from outer-corner to inner point
  ctx.beginPath();
  ctx.moveTo(xOut, yOut);
  ctx.lineTo(xIn + diagSpan, yIn + diagSpan);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(xOutR, yOut);
  ctx.lineTo(xInR - diagSpan, yIn + diagSpan);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(xOut, yOutB);
  ctx.lineTo(xIn + diagSpan, yInB - diagSpan);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(xOutR, yOutB);
  ctx.lineTo(xInR - diagSpan, yInB - diagSpan);
  ctx.stroke();

  ctx.restore();
}

function drawBlock(x, y, size, type, r, c, scaleOverride) {
  if (!BLOCK_COLORS[type]) return;
  const pad = Math.max(1, Math.floor(size * 0.06));
  const inner = size - pad * 2;
  const br = Math.max(2, size * 0.12);

  // Compute bounce scale (game animation — preserved)
  let bounceScale = scaleOverride || 1;
  const key = animCellKey(r, c);
  const bounce = animState.bounces[key];
  if (bounce) {
    const elapsed = performance.now() - bounce.startTime;
    const duration = 400;
    if (elapsed > duration) {
      delete animState.bounces[key];
    } else {
      const t = elapsed / duration;
      bounceScale = 1 + bounce.intensity * 0.18 * Math.sin(t * Math.PI * 2.5) * Math.max(0, 1 - t * 1.2);
    }
  }

  // Compute shake offset (HEALTHY_FARM rejection feedback — horizontal oscillation)
  let shakeOffsetX = 0;
  const shake = animState.shakes[key];
  if (shake) {
    const elapsed = performance.now() - shake.startTime;
    const totalDuration = 150; // 3 cycles × 50ms
    if (elapsed > totalDuration) {
      delete animState.shakes[key];
    } else {
      const cycles = 3;
      const cycleTime = totalDuration / cycles; // 50ms
      const phase = (elapsed % cycleTime) / cycleTime; // 0..1 within current cycle
      const amplitude = 3; // 3px shake
      // Triangle wave: moves linearly left-right-left within each cycle
      shakeOffsetX = amplitude * (1 - Math.abs(phase * 4 - 2));
      if (phase < 0.5) shakeOffsetX = -shakeOffsetX; // alternate direction
    }
  }

  ctx.save();

  // Apply shake horizontal offset
  if (shakeOffsetX !== 0) {
    ctx.translate(shakeOffsetX, 0);
  }

  // Apply bounce scale
  if (bounceScale !== 1) {
    const cx = x + size / 2;
    const cy = y + size / 2;
    ctx.translate(cx, cy);
    ctx.scale(bounceScale, bounceScale);
    ctx.translate(-cx, -cy);
  }

  // Shadow (subtle depth)
  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = size * 0.05;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;

  // Draw PNG block image (with rounded-rect clip for clean edges)
  const img = blockImages[type];
  if (img && img.complete && img.naturalWidth > 0) {
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.save();
    ctx.clip();
    ctx.drawImage(img, x + pad, y + pad, inner, inner);
    ctx.restore();
  } else {
    // Fallback: simple colored rounded rect while image loads
    const colors = BLOCK_COLORS[type];
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.fillStyle = colors.fill;
    ctx.fill();
    roundRect(x + pad, y + pad, inner, inner, br);
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = Math.max(0.8, size * 0.025);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // Draw fence border for healthy farmland blocks
  if (type === BLOCK.HEALTHY_FARM) {
    drawFence(x, y, size);
  }

  ctx.restore();
}

function drawBoard(board, highlightCells = null) {
  const size = board.length;
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvasLogicalSize, canvasLogicalSize);

  const boardW = size * cellSize;
  const boardH = size * cellSize;
  const M = boardMargin;  // shorthand for frame width

  // ═══════════════════════════════════════════════
  // 1. BOARD FLOOR BACKGROUND (image replaces wood frame + parchment)
  // ═══════════════════════════════════════════════
  if (boardBgReady) {
    ctx.drawImage(boardBgImage, 0, 0, canvasLogicalSize, canvasLogicalSize);
  } else {
    // Fallback: placeholder while image loads (lighter tone — clearly different from old wood frame)
    const fallbackGrad = ctx.createLinearGradient(0, 0, 0, canvasLogicalSize);
    fallbackGrad.addColorStop(0, '#8B7355');
    fallbackGrad.addColorStop(1, '#6B5540');
    ctx.fillStyle = fallbackGrad;
    ctx.fillRect(0, 0, canvasLogicalSize, canvasLogicalSize);
  }

  // ═══════════════════════════════════════════════
  // 2. CELL BACKGROUNDS (nearly transparent — floor image shows through)
  // ═══════════════════════════════════════════════
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cellX = M + c * cellSize;
      const cellY = M + r * cellSize;
      const cellPad = cellSize * 0.07;
      const cellInner = cellSize - cellPad * 2;
      const cellSeed = 8500 + r * 20 + c;

      wobblyRoundRect(ctx, cellX + cellPad, cellY + cellPad, cellInner, cellInner, cellInner * 0.10, 0.028, cellSeed);

      // Very faint cell fill — barely visible, lets floor image dominate
      const cellGrad = ctx.createLinearGradient(cellX + cellPad, cellY + cellPad, cellX + cellPad, cellY + cellPad + cellInner);
      cellGrad.addColorStop(0, 'rgba(255,253,235,0.08)');
      cellGrad.addColorStop(0.5, 'rgba(248,242,215,0.04)');
      cellGrad.addColorStop(1, 'rgba(238,228,195,0.06)');
      ctx.fillStyle = cellGrad;
      ctx.fill();

      // Cell border (thin, wobbly) — grid lines
      ctx.strokeStyle = 'rgba(80,65,45,0.30)';
      ctx.lineWidth = 0.6 + hashXY(cellSeed, 0, 870) * 0.4;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Subtle inner shadow for depth
      wobblyRoundRect(ctx, cellX + cellPad + 1.2, cellY + cellPad + 0.8, cellInner - 2.4, cellInner - 1.6, cellInner * 0.09, 0.030, cellSeed + 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Build drop & skip maps from animation state
  const dropMap = {};
  const skipCells = new Set();
  if (animState.elim) {
    for (const cell of animState.elim.cells) {
      skipCells.add(animCellKey(cell.r, cell.c));
    }
  }
  // Also skip cells being swapped — their backgrounds already show, blocks drawn at interpolated pos
  if (animState.swap) {
    skipCells.add(animCellKey(animState.swap.r1, animState.swap.c1));
    skipCells.add(animCellKey(animState.swap.r2, animState.swap.c2));
  }
  if (animState.drops) {
    const t = animState.drops.progress || 0;
    const ease = easeOutBack(t);
    for (const d of animState.drops.items) {
      const currentR = d.fromR + (d.toR - d.fromR) * ease;
      dropMap[animCellKey(d.toR, d.c)] = { currentR, type: d.type };
      // Skip drawing at the FROM position (it's moving)
      if (d.fromR >= 0) skipCells.add(animCellKey(d.fromR, d.c));
    }
  }

  // Draw blocks
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const key = animCellKey(r, c);
      if (skipCells.has(key)) continue;

      if (dropMap[key]) {
        // Currently dropping — draw at interpolated position
        drawBlock(M + c * cellSize, M + dropMap[key].currentR * cellSize, cellSize, dropMap[key].type, r, c);
      } else if (board[r][c]) {
        drawBlock(M + c * cellSize, M + r * cellSize, cellSize, board[r][c], r, c);
      }
    }
  }

  // Draw swap animation overlay
  if (animState.swap) {
    const s = animState.swap;
    const elapsed = performance.now() - s.startTime;
    const t = Math.min(1, elapsed / s.duration);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    const x1 = M + s.c1 * cellSize, y1 = M + s.r1 * cellSize;
    const x2 = M + s.c2 * cellSize, y2 = M + s.r2 * cellSize;
    const px1 = x1 + (x2 - x1) * ease;
    const py1 = y1 + (y2 - y1) * ease;
    const px2 = x2 + (x1 - x2) * ease;
    const py2 = y2 + (y1 - y2) * ease;
    // Cell backgrounds already drawn — just draw swapped blocks at interpolated positions
    drawBlock(px1, py1, cellSize, board[s.r1][s.c1], s.r1, s.c1);
    drawBlock(px2, py2, cellSize, board[s.r2][s.c2], s.r2, s.c2);
  }

  // Draw elimination glow
  if (animState.elim) {
    const t = Math.min(1, (performance.now() - animState.elim.startTime) / animState.elim.duration);
    for (const cell of animState.elim.cells) {
      const cx = M + cell.c * cellSize + cellSize / 2;
      const cy = M + cell.r * cellSize + cellSize / 2;
      const alpha = Math.max(0, 1 - t);
      const glowR = cellSize * 0.45 * (1 + t * 0.5);
      ctx.save();
      ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = '#FFFBE6';
      ctx.shadowColor = 'rgba(255,200,0,0.8)';
      ctx.shadowBlur = cellSize * 0.25;
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawBlock(M + cell.c * cellSize, M + cell.r * cellSize, cellSize, cell.type, cell.r, cell.c, 1 + t * 0.35);
    }
  }

  // Highlight cells
  if (highlightCells) {
    for (const { r, c } of highlightCells) {
      ctx.strokeStyle = '#E1CB6B';
      ctx.lineWidth = Math.max(2, cellSize * 0.06);
      ctx.strokeRect(M + c * cellSize + 2, M + r * cellSize + 2, cellSize - 4, cellSize - 4);
    }
  }

  // Tutorial highlight overlay
  if (typeof tutorialSystem !== 'undefined') {
    tutorialSystem.renderHighlights(ctx);
  }
}

// --- Particle System ---
let particles = [];
let floatTexts = [];
let flashEffects = []; // white flash for 4+ block matches
let animFrameId = null;

const MAX_PARTICLES = 30;

function spawnParticles(cx, cy, count, color, spread, life) {
  // Cap total active particles to prevent performance issues during chain reactions
  var allowed = count;
  if (particles.length >= MAX_PARTICLES) return;
  if (particles.length + count > MAX_PARTICLES) {
    allowed = MAX_PARTICLES - particles.length;
  }
  for (let i = 0; i < allowed; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * spread;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - spread * 0.3,
      life: life + Math.random() * life * 0.5,
      maxLife: life * 1.5,
      color: color,
      size: 1.5 + Math.random() * 3
    });
  }
}

function spawnElimParticles(cells, color) {
  for (const cell of cells) {
    const cx = boardMargin + cell.c * cellSize + cellSize / 2;
    const cy = boardMargin + cell.r * cellSize + cellSize / 2;
    spawnParticles(cx, cy, 8, color, cellSize * 0.12, 400);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.001 * dt; // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result
    ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) }
    : { r: 0, g: 0, b: 0 };
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const size = p.size * alpha;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Float Text System ---
function spawnFloatText(x, y, text, color) {
  floatTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, startTime: performance.now(), duration: 1200 });
}

function updateFloatTexts(dt) {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    const elapsed = performance.now() - ft.startTime;
    ft.life = Math.max(0, 1 - elapsed / ft.duration);
    ft.y -= 30 * (dt / 1000);
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }
}

function drawFloatTexts(pctx) {
  for (const ft of floatTexts) {
    pctx.save();
    pctx.globalAlpha = ft.life;
    pctx.fillStyle = ft.color;
    pctx.font = 'bold 18px "Noto Serif SC", "Source Han Serif SC", serif';
    pctx.textAlign = 'center';
    pctx.shadowColor = 'rgba(0,0,0,0.3)';
    pctx.shadowBlur = 3;
    pctx.fillText(ft.text, ft.x, ft.y);
    pctx.restore();
  }
}

// --- Render loop ---
let renderBoard = null;
let renderHighlights = null;

function hasActiveAnimations() {
  return particles.length > 0 ||
    floatTexts.length > 0 ||
    flashEffects.length > 0 ||
    game.state === 'animating' ||
    animState.swap !== null ||
    animState.elim !== null ||
    animState.drops !== null ||
    Object.keys(animState.bounces).length > 0 ||
    Object.keys(animState.shakes).length > 0;
}

function startRenderLoop() {
  if (animFrameId) return;
  let lastTime = performance.now();

  function loop(time) {
    const dt = time - lastTime;
    lastTime = time;

    updateParticles(dt);
    updateFloatTexts(dt);
    updateFlashes();

    // Clean stale bounces & shakes
    const now = performance.now();
    for (const [key, b] of Object.entries(animState.bounces)) {
      if (now - b.startTime > 400) delete animState.bounces[key];
    }
    for (const [key, s] of Object.entries(animState.shakes)) {
      if (now - s.startTime > 200) delete animState.shakes[key];
    }

    // Auto-clear stale animation states
    if (animState.elim && now - animState.elim.startTime > animState.elim.duration + 200) {
      animState.elim = null;
    }

    if (renderBoard) {
      drawBoard(renderBoard, renderHighlights);
      drawParticles();
      drawFloatTexts(ctx);
      drawFlashes(ctx);
    }

    if (hasActiveAnimations()) {
      animFrameId = requestAnimationFrame(loop);
    } else {
      animFrameId = null;
      // Final render to clean up
      if (renderBoard) {
        drawBoard(renderBoard, renderHighlights);
        drawFloatTexts(ctx);
        drawFlashes(ctx);
      }
    }
  }

  animFrameId = requestAnimationFrame(loop);
}

function stopRenderLoop() {
  if (animFrameId) {
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
  }
}

// --- Flash Effects (4+ block elimination) ---

function spawnFlash(x, y, maxRadius) {
  flashEffects.push({ x, y, startTime: performance.now(), duration: 500, maxRadius: maxRadius });
  // Cap at 24 active flashes
  if (flashEffects.length > 24) flashEffects.shift();
}

function updateFlashes() {
  var now = performance.now();
  for (var i = flashEffects.length - 1; i >= 0; i--) {
    if (now - flashEffects[i].startTime > flashEffects[i].duration) {
      flashEffects.splice(i, 1);
    }
  }
}

function drawFlashes(ctx) {
  var now = performance.now();
  for (var i = 0; i < flashEffects.length; i++) {
    var f = flashEffects[i];
    var progress = (now - f.startTime) / f.duration;
    if (progress > 1) continue;
    // Expand and fade: radius grows 20%->100%, alpha decreases 0.7->0
    var radius = f.maxRadius * (0.2 + progress * 0.8);
    var alpha = (1 - progress) * 0.7;

    ctx.save();
    ctx.globalAlpha = alpha;
    var glow = ctx.createRadialGradient(f.x, f.y, radius * 0.05, f.x, f.y, radius);
    glow.addColorStop(0, 'rgba(255,255,255,1)');
    glow.addColorStop(0.35, 'rgba(255,255,255,0.7)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function triggerRender(board, highlights = null) {
  renderBoard = board;
  renderHighlights = highlights;
  // Draw immediately
  drawBoard(board, highlights);
  drawParticles();
  drawFloatTexts(ctx);
  drawFlashes(ctx);
  // Continue loop if animations active
  if (!animFrameId && (particles.length > 0 || game.state === 'animating')) {
    startRenderLoop();
  }
}

// --- Swap Animation ---
// ============================================================
// 8. AUDIO — Web Audio API 音效
// ============================================================
let audioCtx = null;
let muted = false;

// ============================================================
// BACKGROUND MUSIC — 3-voice (melody + harmony pad + bass)
// 4/4 time, BPM=100, C major, 16-bar loop
// Inspired by Stardew Valley / Animal Crossing daytime music
// ============================================================

// --- Music state ---
let musicPlaying = false;
let musicTickId = null;       // setInterval ID for scheduler
let musicStartTime = 0;       // audioCtx.currentTime of bar 0
let musicMasterGain = null;   // master gain for breathing effect
let musicScheduledLoop = -1;  // last scheduled loop index

// --- BPM & timing ---
var MUSIC_BPM = 100;
var MUSIC_BEAT = 60 / MUSIC_BPM;       // 0.6s per quarter note
var MUSIC_BAR = MUSIC_BEAT * 4;        // 2.4s per bar (4/4)
var MUSIC_LOOP_BARS = 16;
var MUSIC_LOOP_SEC = MUSIC_LOOP_BARS * MUSIC_BAR; // 38.4s

// --- Chord definitions (C major: I, V, vi, IV) ---
// [root (bass oct), third, fifth] — frequencies in Hz
var CHORDS = {
  'I':  { root: 65.4,  third: 164.8, fifth: 196.0, high: 261.6 },  // C: C2 E3 G3 C4
  'V':  { root: 98.0,  third: 123.5, fifth: 146.8, high: 196.0 },  // G: G2 B2 D3 G3
  'vi': { root: 110.0, third: 130.8, fifth: 164.8, high: 220.0 },  // Am: A2 C3 E3 A3
  'IV': { root: 87.3,  third: 110.0, fifth: 130.8, high: 174.6 },  // F: F2 A2 C3 F3
};

// 16-bar chord progression (each chord holds 2 bars)
var CHORD_SEQ = [
  'I','I','V','V','vi','vi','IV','IV',
  'I','I','V','V','vi','vi','IV','I'
];

// --- Melody: [startBar, beatInBar, freqHz, durBeats] ---
// 16 bars, C pentatonic (C5=523 D5=587 E5=659 G5=784 A5=880 C6=1047)
// Dotted rhythms for bouncy, pastoral feel
var MELODY = [
  // Phrase A: bars 0-3 (C-C-G-G) — bright opening
  [0, 0.0, 523, 1.5], [0, 1.5, 587, 0.5], [0, 2.0, 659, 0.5], [0, 2.5, 784, 0.5], [0, 3.0, 659, 1.0],
  [1, 0.0, 587, 0.5], [1, 0.5, 523, 0.5], [1, 1.0, 659, 1.0], [1, 2.0, 523, 2.0],
  [2, 0.0, 587, 1.5], [2, 1.5, 659, 0.5], [2, 2.0, 587, 0.5], [2, 2.5, 523, 0.5], [2, 3.0, 440, 1.0],
  [3, 0.0, 392, 1.0], [3, 1.0, 440, 0.5], [3, 1.5, 523, 0.5], [3, 2.0, 587, 2.0],
  // Phrase B: bars 4-7 (Am-Am-F-F) — emotional rise
  [4, 0.0, 659, 1.5], [4, 1.5, 523, 0.5], [4, 2.0, 587, 0.5], [4, 2.5, 659, 0.5], [4, 3.0, 784, 1.0],
  [5, 0.0, 880, 1.0], [5, 1.0, 784, 0.5], [5, 1.5, 659, 0.5], [5, 2.0, 523, 2.0],
  [6, 0.0, 880, 1.0], [6, 1.0, 784, 0.5], [6, 1.5, 659, 0.5], [6, 2.0, 523, 0.5], [6, 2.5, 587, 0.5], [6, 3.0, 523, 1.0],
  [7, 0.0, 440, 1.0], [7, 1.0, 523, 0.5], [7, 1.5, 659, 0.5], [7, 2.0, 523, 2.0],
  // Phrase A': bars 8-11 (C-C-G-G) — variation with octave jumps
  [8, 0.0, 523, 0.5], [8, 0.5, 1047, 1.0], [8, 1.5, 880, 0.5], [8, 2.0, 784, 1.0], [8, 3.0, 659, 1.0],
  [9, 0.0, 587, 0.5], [9, 0.5, 523, 1.5], [9, 2.0, 659, 2.0],
  [10, 0.0, 587, 0.5], [10, 0.5, 440, 0.5], [10, 1.0, 587, 1.0], [10, 2.0, 659, 0.5], [10, 2.5, 784, 0.5], [10, 3.0, 659, 1.0],
  [11, 0.0, 587, 1.0], [11, 1.0, 392, 0.5], [11, 1.5, 440, 0.5], [11, 2.0, 523, 2.0],
  // Phrase B': bars 12-15 (Am-Am-F-C) — graceful resolution
  [12, 0.0, 659, 0.5], [12, 0.5, 880, 1.0], [12, 1.5, 784, 0.5], [12, 2.0, 659, 0.5], [12, 2.5, 523, 0.5], [12, 3.0, 659, 1.0],
  [13, 0.0, 784, 1.5], [13, 1.5, 659, 0.5], [13, 2.0, 523, 2.0],
  [14, 0.0, 880, 0.5], [14, 0.5, 784, 0.5], [14, 1.0, 659, 1.0], [14, 2.0, 587, 0.5], [14, 2.5, 523, 0.5], [14, 3.0, 440, 1.0],
  [15, 0.0, 392, 0.5], [15, 0.5, 523, 1.5], [15, 2.0, 659, 0.5], [15, 2.5, 523, 1.5],
];

// --- Single music note ---
function playMusicNote(freq, startTime, endTime, type, vol, filterFreq) {
  if (!audioCtx || muted) return;
  // Only skip notes that are VERY stale (>2s in past) — let Web Audio handle slightly late starts
  if (startTime < audioCtx.currentTime - 2.0) return;

  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var dur = endTime - startTime;

  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);

  // Gentle ADSR-like envelope
  gain.gain.setValueAtTime(0, startTime);
  if (dur > 1.5) {
    // Sustained notes (harmony pads, bass)
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.03);
    gain.gain.setValueAtTime(vol * 0.8, startTime + dur * 0.85);
    gain.gain.linearRampToValueAtTime(0, endTime);
  } else {
    // Short notes (melody) — quick attack, gentle decay
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.01);
    gain.gain.setValueAtTime(vol * 0.6, startTime + dur * 0.55);
    gain.gain.linearRampToValueAtTime(0, endTime);
  }

  var output = osc;
  if (filterFreq && filterFreq > 0) {
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterFreq, startTime);
    osc.connect(filter);
    output = filter;
  }

  output.connect(gain);
  gain.connect(musicMasterGain || audioCtx.destination);
  osc.start(startTime);
  osc.stop(endTime + 0.03);
}

// --- Schedule all 3 voices for one loop iteration ---
function scheduleAllVoices(loopStartTime) {
  if (!audioCtx) return;

  // ---- Melody (triangle wave, bell-like) ----
  for (var i = 0; i < MELODY.length; i++) {
    var m = MELODY[i];
    var t0 = loopStartTime + m[0] * MUSIC_BAR + m[1] * MUSIC_BEAT;
    var t1 = t0 + m[3] * MUSIC_BEAT;
    playMusicNote(m[2], t0, t1, 'triangle', 0.08, 0);
  }

  // ---- Bass (sine wave, simple root+5th pattern) ----
  for (var bar = 0; bar < MUSIC_LOOP_BARS; bar++) {
    var chord = CHORDS[CHORD_SEQ[bar]];
    if (!chord) continue;
    var barStart = loopStartTime + bar * MUSIC_BAR;
    // Beat 0: root note
    playMusicNote(chord.root, barStart, barStart + MUSIC_BEAT * 1.8, 'sine', 0.06, 0);
    // Beat 2: alternating root or fifth
    var bass2 = (bar % 2 === 0) ? chord.fifth : chord.root;
    playMusicNote(bass2, barStart + 2 * MUSIC_BEAT, barStart + MUSIC_BEAT * 3.8, 'sine', 0.05, 0);
  }

  // ---- Harmony pad (soft sawtooth, low-pass filtered, changes every 2 bars) ----
  for (var bar = 0; bar < MUSIC_LOOP_BARS; bar += 2) {
    var chord = CHORDS[CHORD_SEQ[bar]];
    if (!chord) continue;
    var t0 = loopStartTime + bar * MUSIC_BAR;
    var t1 = t0 + 2 * MUSIC_BAR; // hold for 2 bars
    // Soft sawtooth with low-pass at 400Hz → warm string-pad tone
    playMusicNote(chord.third, t0, t1, 'sawtooth', 0.025, 400);
    playMusicNote(chord.fifth, t0, t1, 'sawtooth', 0.022, 400);
    playMusicNote(chord.high,  t0, t1, 'sawtooth', 0.018, 400);
  }
}

// --- Master gain breathing LFO (gentle 4-bar swell) ---
function updateMusicBreathing() {
  if (!musicMasterGain || !musicPlaying || muted) return;
  var now = audioCtx.currentTime;
  var elapsed = now - musicStartTime;
  if (elapsed < 0) return;
  var breathPeriod = MUSIC_BAR * 4; // 4-bar breathing cycle (9.6s)
  var phase = (elapsed % breathPeriod) / breathPeriod;
  var breath = 0.9 + 0.1 * Math.sin(phase * Math.PI * 2);
  musicMasterGain.gain.linearRampToValueAtTime(breath, now + 0.5);
}

// --- Scheduler tick (runs every 50ms) ---
function musicTick() {
  if (!musicPlaying || !audioCtx || muted) return;
  if (audioCtx.state === 'suspended') return;

  var now = audioCtx.currentTime;
  var elapsed = now - musicStartTime;

  // Re-sync if we fell far behind (e.g. tab was backgrounded for minutes)
  if (elapsed > MUSIC_LOOP_SEC * 3) {
    var phase = elapsed % MUSIC_LOOP_SEC;
    musicStartTime = now - phase;
    musicScheduledLoop = -1;
  }

  // Double-buffer: always ensure current + next loop are scheduled.
  // The while-loop catches up if ticks were delayed or pre-scheduling was missed.
  var currentLoop = Math.floor(Math.max(0, now - musicStartTime) / MUSIC_LOOP_SEC);
  while (musicScheduledLoop < currentLoop + 1) {
    musicScheduledLoop++;
    scheduleAllVoices(musicStartTime + musicScheduledLoop * MUSIC_LOOP_SEC);
  }

  // Update breathing LFO
  updateMusicBreathing();
}

// --- Public API ---

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicMasterGain = audioCtx.createGain();
    musicMasterGain.gain.setValueAtTime(0.9, audioCtx.currentTime);
    musicMasterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!musicPlaying) startBackgroundMusic();
}

function startBackgroundMusic() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;
  musicStartTime = audioCtx.currentTime + 0.15;
  musicScheduledLoop = -1;
  if (musicTickId) clearInterval(musicTickId);
  musicTickId = setInterval(musicTick, 50);
  musicTick(); // immediate first tick
}

function stopBackgroundMusic() {
  musicPlaying = false;
  if (musicTickId) { clearInterval(musicTickId); musicTickId = null; }
}

function resumeBackgroundMusic() {
  if (!musicPlaying && !muted && audioCtx) {
    startBackgroundMusic();
  }
}

// --- General purpose synth helpers ---

function playTone(freq, duration, type, vol, attackT, releaseT) {
  if (muted || !audioCtx) return;
  type = type || 'sine';
  vol = (vol !== undefined ? vol : 0.1);
  attackT = attackT || 0.005;
  releaseT = releaseT || 0.03;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + attackT);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + releaseT);
}

function playChord(freqs, duration, type, vol) {
  if (muted || !audioCtx) return;
  type = type || 'sine';
  vol = (vol !== undefined ? vol : 0.07);
  for (var i = 0; i < freqs.length; i++) {
    playTone(freqs[i], duration, type, vol);
  }
}

function playNoise(duration, vol, lowpass) {
  if (muted || !audioCtx) return;
  vol = (vol !== undefined ? vol : 0.04);
  lowpass = lowpass || 0;
  var t = audioCtx.currentTime;
  var bufferSize = Math.floor(audioCtx.sampleRate * duration);
  var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  var data = buffer.getChannelData(0);

  var lastOut = 0;
  for (var i = 0; i < bufferSize; i++) {
    var white = Math.random() * 2 - 1;
    lastOut = (lastOut + (0.02 * white)) / 1.02;
    data[i] = lastOut * 3 * vol * (1 - i / bufferSize);
  }

  var source = audioCtx.createBufferSource();
  source.buffer = buffer;

  var outputNode = source;
  if (lowpass > 0) {
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(lowpass, t);
    source.connect(filter);
    outputNode = filter;
  }

  var envGain = audioCtx.createGain();
  envGain.gain.setValueAtTime(vol * 2, t);
  envGain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  outputNode.connect(envGain);
  envGain.connect(audioCtx.destination);
  source.start(t);
}

function playBuzz(freq, duration, vol) {
  if (muted || !audioCtx) return;
  vol = (vol !== undefined ? vol : 0.06);
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.005);
  gain.gain.linearRampToValueAtTime(vol * 0.5, t + duration * 0.6);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.02);
}

function playSlide(startFreq, endFreq, duration, type, vol) {
  if (muted || !audioCtx) return;
  type = type || 'sine';
  vol = (vol !== undefined ? vol : 0.1);
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(startFreq, t);
  osc.frequency.exponentialRampToValueAtTime(endFreq, t + duration);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}

// ============================================================
// 9. STORAGE — 持久化
// ============================================================
const STORAGE_KEY = 'wotu_progress';
const STORAGE_STATS = 'wotu_stats';

function saveProgress(levelNum) {
  try { localStorage.setItem(STORAGE_KEY, String(levelNum)); } catch(e) {}
}

function loadProgress() {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? Math.min(Number(v), 3) : 1;
  } catch(e) { return 1; }
}

function saveStats(stats) {
  try { localStorage.setItem(STORAGE_STATS, JSON.stringify(stats)); } catch(e) {}
}

function loadStats() {
  try {
    const v = localStorage.getItem(STORAGE_STATS);
    return v ? JSON.parse(v) : { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 };
  } catch(e) { return { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 }; }
}

function resetProgress() {
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_STATS); } catch(e) {}
}

// ============================================================
// 10. GAME CONTROLLER — 游戏状态机
// ============================================================
const STATE = { IDLE: 'idle', SWAPPING: 'swapping', ANIMATING: 'animating', GAME_OVER: 'game_over' };

const game = {
  levelNum: 1,
  board: null,
  stepsLeft: 0,
  grainReserve: 0,
  reclaimedCount: 0,
  target: 0,
  levelConfig: null,
  state: STATE.IDLE,
  selectedCell: null,
  drainRate: 0,
  totalTime: 0,
  timerInterval: null,
  timerPaused: false,
  stats: loadStats(),

  initLevel(levelNum) {
    this.levelNum = levelNum;
    this.levelConfig = LEVELS[levelNum - 1];
    const cfg = this.levelConfig;

    // Calculate drain rate: grainInit% drained over totalTime seconds
    this.drainRate = cfg.grainInit / cfg.totalTime;
    this.totalTime = cfg.totalTime;

    this.board = createBoard(cfg.size, cfg.pollutants, cfg.looseSoilInit);
    this.stepsLeft = cfg.steps;
    this.grainReserve = cfg.grainInit;
    this.reclaimedCount = 0;
    this.target = cfg.target;
    this.state = STATE.IDLE;
    this.selectedCell = null;

    // Start the real-time countdown timer
    this.startTimer();

    resizeCanvas(cfg.size);
    this.render();
    this.updateUI();
    document.getElementById('btn-next').style.display = 'none';
    drawBottomBarCanvas();

    // Clear animation state
    animState.swap = null;
    animState.elim = null;
    animState.drops = null;
    animState.bounces = {};
    clearFirstTap();
    updateLevelSelector();
    buildBlockLegend(levelNum);

    if (cfg.intro) {
      // Pause timer during level intro popup
      this.pauseTimer();
      const onIntroDismiss = () => {
        this.resumeTimer();
        if (cfg.hasGuide) guideSystem.start();
      };
      showLevelIntro(cfg.intro, onIntroDismiss);
    } else if (cfg.hasGuide) {
      guideSystem.start();
    }
  },

  render(highlightCells = null) {
    triggerRender(this.board, highlightCells);
  },

  updateUI() {
    const cfg = this.levelConfig;
    document.getElementById('level-name').textContent = cfg.name;
    document.getElementById('reclaim-progress').textContent = this.reclaimedCount + '/' + this.target;
    document.getElementById('steps-left').textContent = this.stepsLeft;

    // Time countdown bar
    const grainPercent = Math.max(0, this.grainReserve);
    const grainBar = document.getElementById('grain-bar-inner');
    grainBar.style.width = grainPercent + '%';

    // Display remaining time in M:SS format
    const remainingSec = Math.max(0, Math.ceil(this.grainReserve / (this.drainRate || 0.1667)));
    const mins = Math.floor(remainingSec / 60);
    const secs = remainingSec % 60;
    const timeLabel = document.getElementById('grain-bar-label');
    timeLabel.textContent = '⏱ ' + mins + ':' + String(secs).padStart(2, '0');

    // Color warning when low on time
    if (grainPercent <= 20) {
      grainBar.style.background = 'linear-gradient(180deg, #FF5252 0%, #E53935 50%, #C62828 100%)';
      timeLabel.classList.add('grain-urgent');
    } else if (grainPercent <= 40) {
      grainBar.style.background = 'linear-gradient(180deg, #F0DC82 0%, #E1CB6B 50%, #C4A840 100%)';
      timeLabel.classList.remove('grain-urgent');
    } else {
      grainBar.style.background = 'linear-gradient(180deg, #F0DC82 0%, #E1CB6B 35%, #C4A840 70%, #A88920 100%)';
      timeLabel.classList.remove('grain-urgent');
    }
    // Steps warning
    const stepsEl = document.getElementById('steps-left');
    if (this.stepsLeft <= 3) {
      stepsEl.style.color = '#FF5252';
    } else if (this.stepsLeft <= 6) {
      stepsEl.style.color = '#F0DC82';
    } else {
      stepsEl.style.color = '#F0DC82';
    }

    // Redraw hand-drawn top bar canvas
    drawTopBarCanvas();
  },

  // ── Real-time countdown timer ──
  startTimer() {
    this.stopTimer();
    this.timerPaused = false;
    this.timerInterval = setInterval(() => {
      if (this.state === STATE.GAME_OVER || this.timerPaused) return;
      this.grainReserve = Math.max(0, this.grainReserve - this.drainRate * 0.1);
      this.updateUI();
      if (this.grainReserve <= 0) {
        this.stopTimer();
        this.checkLose();
      }
    }, 100);
  },

  stopTimer() {
    if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
  },

  pauseTimer() { this.timerPaused = true; },
  resumeTimer() { this.timerPaused = false; },

  addTime(seconds) {
    // Convert seconds to reserve percentage using the level's drain rate
    const gain = this.drainRate * seconds;
    this.grainReserve = Math.min(100, this.grainReserve + gain);
    this.updateUI();
  },

  async handleSwap(r1, c1, r2, c2) {
    if (this.state !== STATE.IDLE) return;
    if (!isAdjacent(r1, c1, r2, c2)) return;

    // Reject swaps involving healthy farmland (immovable obstacle)
    if (this.board[r1][c1] === BLOCK.HEALTHY_FARM || this.board[r2][c2] === BLOCK.HEALTHY_FARM) {
      // Shake the healthy farmland tile + vibrate + sfx
      const hr = this.board[r1][c1] === BLOCK.HEALTHY_FARM ? r1 : r2;
      const hc = this.board[r1][c1] === BLOCK.HEALTHY_FARM ? c1 : c2;
      shakeTile(hr, hc);
      vibrate();
      sfxInvalid();
      return;
    }

    // Tutorial check: if tutorial is active, verify this is the correct swap
    if (typeof tutorialSystem !== 'undefined' && tutorialSystem.waitingForSwap) {
      if (!isSameSwap(tutorialSystem.targetCells, r1, c1, r2, c2)) {
        // Wrong swap — block it, show hint shake
        const tooltip = document.getElementById('guide-tooltip');
        if (tooltip) {
          tooltip.style.animation = 'none';
          tooltip.offsetHeight;
          tooltip.style.animation = 'tutorialShake 0.4s ease';
        }
        return;
      }
      tutorialSystem.waitingForSwap = false;
      document.getElementById('guide-backdrop').classList.remove('active');
      document.getElementById('guide-tooltip').style.display = 'none';
    }

    initAudio();
    this.state = STATE.SWAPPING;

    // Animate swap
    animState.swap = { r1, c1, r2, c2, startTime: performance.now(), duration: 280 };
    startRenderLoop();
    sfxSwap();

    // Execute board swap
    const originalBoard = cloneBoard(this.board);
    const tmp = this.board[r1][c1];
    this.board[r1][c1] = this.board[r2][c2];
    this.board[r2][c2] = tmp;

    // Wait for swap animation
    await new Promise(resolve => setTimeout(resolve, 280));
    animState.swap = null;

    // Add bounce to swapped cells
    addBounce(r1, c1, 0.7);
    addBounce(r2, c2, 0.7);

    // Check for matches
    const { matchGroups } = findAllMatches(this.board);

    if (matchGroups.length === 0) {
      // Invalid move — revert
      this.board = originalBoard;
      this.stepsLeft--;
      this.grainReserve = Math.max(0, this.grainReserve - this.levelConfig.invalidPenalty);
      sfxInvalid();
      // Spawn penalty float text
      const boardCX = boardMargin + (this.board.length * cellSize) / 2;
      const boardCY = boardMargin + (this.board.length * cellSize) / 2;
      spawnFloatText(boardCX, boardCY - 20, '-' + this.levelConfig.invalidPenalty + '%', '#FF5252');
      this.render();
      this.updateUI();

      if (this.checkLose()) return;
      this.state = STATE.IDLE;
      guideSystem.onInvalidMove();
      return;
    }

    // Valid move
    this.stepsLeft--;
    this.render();
    this.updateUI();

    await this.processChain(matchGroups);
  },

  async processChain(matchGroups) {
    this.state = STATE.ANIMATING;

    // Collect all cells being eliminated
    const allCells = [];
    for (const match of matchGroups) {
      for (const cell of match.cells) {
        allCells.push({ r: cell.r, c: cell.c, type: this.board[cell.r][cell.c] });
      }
    }

    // --- Elimination animation ---
    animState.elim = { cells: allCells, startTime: performance.now(), duration: 380 };
    startRenderLoop();

    // Spawn particles during elimination — enhanced effects for 4+ matches
    for (const match of matchGroups) {
      const blockColor = BLOCK_COLORS[match.type] ? BLOCK_COLORS[match.type].fill : '#8D6E63';
      spawnElimParticles(match.cells, blockColor);

      // 4+ block match: white flash + burst particles + special SFX
      if (match.cells.length >= 4) {
        sfxBigMatch();
        for (const cell of match.cells) {
          const cx = boardMargin + cell.c * cellSize + cellSize / 2;
          const cy = boardMargin + cell.r * cellSize + cellSize / 2;
          // White flash ring expanding from each cell
          spawnFlash(cx, cy, cellSize * 1.1);
          // Extra burst particles in block color (8-12 per cell)
          spawnParticles(cx, cy, 10, blockColor, cellSize * 0.18, 600);
        }
      }
    }

    await new Promise(resolve => setTimeout(resolve, 380));
    animState.elim = null;

    // Process matches
    const result = processMatches(this.board, matchGroups);
    this.board = result.board;
    this.reclaimedCount += result.reclaimedCount;

    // Reclamation time bonus: +3 seconds per reclaimed block
    if (result.reclaimedCount > 0) {
      const bonusSec = this.levelConfig.reclaimBonus * result.reclaimedCount;
      this.addTime(bonusSec);
      // Spawn green bonus float text
      const boardCX = boardMargin + (this.board.length * cellSize) / 2;
      const boardCY = boardMargin + (this.board.length * cellSize) / 2;
      spawnFloatText(boardCX, boardCY - 40, '+' + bonusSec + '秒', '#66BB6A');
    }

    if (result.reclaimedCount > 0) {
      sfxReclaim();
      for (const match of matchGroups) {
        if (match.type === BLOCK.LOOSE_SOIL) {
          sfxLooseSoilMatch();
          const cx = boardMargin + match.cells[1].c * cellSize + cellSize / 2;
          const cy = boardMargin + match.cells[1].r * cellSize + cellSize / 2;
          spawnParticles(cx, cy, 20, '#F0DC82', cellSize * 0.2, 700);
        }
      }
    } else {
      sfxMatch();
    }

    this.render();
    this.updateUI();

    // --- Compute gravity drops (with HEALTHY_FARM blocking + horizontal slide) ---
    const postGravity = applyGravityAndShift(this.board, this.levelConfig.pollutants);
    const size = this.board.length;
    const dropItems = [];

    for (let c = 0; c < size; c++) {
      // Find non-null cells in current board, bottom to top
      const oldBlocks = [];
      for (let r = size - 1; r >= 0; r--) {
        if (this.board[r][c] !== null) {
          oldBlocks.push({ r, type: this.board[r][c] });
        }
      }
      // Find non-null cells in post-gravity board, bottom to top
      const newBlocks = [];
      for (let r = size - 1; r >= 0; r--) {
        if (postGravity[r][c] !== null) {
          newBlocks.push({ r, type: postGravity[r][c] });
        }
      }
      // Map old blocks to new positions
      for (let i = 0; i < oldBlocks.length && i < newBlocks.length; i++) {
        if (oldBlocks[i].r !== newBlocks[i].r) {
          dropItems.push({
            c,
            fromR: oldBlocks[i].r,
            toR: newBlocks[i].r,
            type: newBlocks[i].type
          });
        }
      }
      // New blocks from top (spawned)
      for (let i = oldBlocks.length; i < newBlocks.length; i++) {
        dropItems.push({
          c,
          fromR: -1 - (i - oldBlocks.length),
          toR: newBlocks[i].r,
          type: newBlocks[i].type
        });
      }
    }

    // --- Gravity drop animation ---
    if (dropItems.length > 0) {
      const dropDuration = Math.min(600, 200 + dropItems.length * 15);
      animState.drops = { items: dropItems, startTime: performance.now(), duration: dropDuration, progress: 0 };

      await animateOver(dropDuration, (t) => {
        if (animState.drops) animState.drops.progress = t;
        this.render(); // re-render each frame
      });

      animState.drops = null;

      // Add bounce to settled cells
      for (const d of dropItems) {
        addBounce(d.toR, d.c, 0.5);
        // Only bounce a few cells to avoid overwhelming
        if (dropItems.length > 8) break;
      }
    }

    // Update board to post-gravity state
    this.board = postGravity;
    this.render();

    // --- Check chain ---
    const { matchGroups: newMatches } = findAllMatches(this.board);

    if (newMatches.length > 0) {
      await this.processChain(newMatches);
    } else {
      if (this.checkWin()) return;
      if (this.checkLose()) return;
      this.state = STATE.IDLE;
      this.render();
      guideSystem.onIdle();
    }
  },

  checkWin() {
    if (this.reclaimedCount >= this.target) {
      this.state = STATE.GAME_OVER;
      this.stopTimer();
      sfxWin();

      // Update stats
      this.stats.levelsCleared = Math.max(this.stats.levelsCleared, this.levelNum);
      this.stats.totalFarmland += this.reclaimedCount;
      this.stats.grainSaved += Math.round(this.grainReserve);
      saveStats(this.stats);

      if (this.levelNum < 3) {
        saveProgress(this.levelNum + 1);
      } else {
        // All levels cleared
        saveProgress(3);
        saveStats(this.stats);
      }

      setTimeout(() => showPopup('win'), 400);
      return true;
    }
    return false;
  },

  checkLose() {
    if (this.stepsLeft <= 0) {
      this.state = STATE.GAME_OVER;
      this.stopTimer();
      sfxLose();
      setTimeout(() => showPopup('lose', '步数耗尽！土地修复的窗口期已过，请重新规划。'), 400);
      return true;
    }
    if (this.grainReserve <= 0) {
      this.state = STATE.GAME_OVER;
      this.stopTimer();
      sfxLose();
      setTimeout(() => showPopup('lose', '修复时间耗尽！倒计时归零，土地修复的窗口期已过。'), 400);
      return true;
    }
    return false;
  },

  nextLevel() {
    if (this.levelNum < 3) {
      this.initLevel(this.levelNum + 1);
    } else {
      showSummary();
    }
  },

  restartLevel() {
    this.initLevel(this.levelNum);
  },

  restartAll() {
    resetProgress();
    this.stats = { totalFarmland: 0, grainSaved: 0, levelsCleared: 0 };
    this.initLevel(1);
  }
};

// ============================================================
// 11. INPUT HANDLER — 触屏 + 鼠标输入 (click-to-swap + drag)
// ============================================================
let touchStartX = 0, touchStartY = 0;
let touchStartCell = null;
let hasDragged = false;
let firstTapCell = null;   // For two-tap swap

function getCellFromClient(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasLogicalSize / rect.width;
  const scaleY = canvasLogicalSize / rect.height;
  const col = Math.floor(((clientX - rect.left) * scaleX - boardMargin) / cellSize);
  const row = Math.floor(((clientY - rect.top) * scaleY - boardMargin) / cellSize);
  if (row >= 0 && row < game.board.length && col >= 0 && col < game.board[0].length) {
    return { r: row, c: col };
  }
  return null;
}

function clearFirstTap() {
  firstTapCell = null;
  game.render();
}

function handlePointerDown(clientX, clientY) {
  if (game.state !== STATE.IDLE) return;
  initAudio();
  const cell = getCellFromClient(clientX, clientY);
  if (!cell) {
    clearFirstTap();
    return;
  }

  touchStartX = clientX;
  touchStartY = clientY;
  touchStartCell = cell;
  hasDragged = false;

  // Two-tap swap: if we already have a first tap, check adjacency
  if (firstTapCell) {
    if (firstTapCell.r === cell.r && firstTapCell.c === cell.c) {
      // Same cell — deselect
      clearFirstTap();
      return;
    }
    if (isAdjacent(firstTapCell.r, firstTapCell.c, cell.r, cell.c)) {
      // Adjacent — swap!
      game.handleSwap(firstTapCell.r, firstTapCell.c, cell.r, cell.c);
      clearFirstTap();
      touchStartCell = null;
      return;
    }
    // Non-adjacent — select new cell instead
  }

  // Select cell
  firstTapCell = cell;
  game.selectedCell = cell;
  game.render([cell]);
  addBounce(cell.r, cell.c, 1.0);
}

function handlePointerMove(clientX, clientY) {
  if (!touchStartCell || game.state !== STATE.IDLE) return;
  const dx = clientX - touchStartX;
  const dy = clientY - touchStartY;
  const threshold = cellSize * 0.25;

  if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
    hasDragged = true;
    clearFirstTap();

    let targetCell = null;
    if (Math.abs(dx) > Math.abs(dy)) {
      targetCell = { r: touchStartCell.r, c: touchStartCell.c + (dx > 0 ? 1 : -1) };
    } else {
      targetCell = { r: touchStartCell.r + (dy > 0 ? 1 : -1), c: touchStartCell.c };
    }

    if (targetCell && targetCell.r >= 0 && targetCell.r < game.board.length &&
        targetCell.c >= 0 && targetCell.c < game.board[0].length) {
      game.render([touchStartCell, targetCell]);
      game.handleSwap(touchStartCell.r, touchStartCell.c, targetCell.r, targetCell.c);
      touchStartCell = null;
      game.selectedCell = null;
    }
  }
}

function handlePointerUp() {
  // If it was a simple tap (no drag), keep the selection
  if (!hasDragged && touchStartCell) {
    game.selectedCell = null;
    game.render(firstTapCell ? [firstTapCell] : null);
  }
  touchStartCell = null;
}

// Touch events
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handlePointerDown(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  handlePointerUp();
});

// Mouse events (desktop support)
canvas.addEventListener('mousedown', (e) => {
  handlePointerDown(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', (e) => {
  if (touchStartCell && !hasDragged) {
    handlePointerMove(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mouseup', (e) => {
  handlePointerUp();
});

canvas.addEventListener('mouseleave', (e) => {
  if (touchStartCell && !hasDragged) {
    game.selectedCell = null;
    game.render();
  }
  touchStartCell = null;
  clearFirstTap();
});

// Prevent context menu on long press
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

function showPopup(type, message) {
  const overlay = document.getElementById('popup-overlay');
  const icon = document.getElementById('popup-icon');
  const title = document.getElementById('popup-title');
  const msg = document.getElementById('popup-message');
  const quoteDiv = document.getElementById('popup-quote');
  const quoteText = document.getElementById('popup-quote-text');
  const quoteSource = document.getElementById('popup-quote-source');
  const btn = document.getElementById('popup-btn');

  overlay.classList.add('active');
  quoteDiv.style.display = 'none';
  btn.className = '';

  if (type === 'win') {
    icon.textContent = '🌾';
    title.textContent = '复耕成功！';
    msg.textContent = '你成功修复了 ' + game.reclaimedCount + ' 块健康耕地！';
    // Show random quote
    const quote = randChoice(QUOTES);
    quoteDiv.style.display = 'block';
    quoteText.textContent = quote.text;
    quoteSource.textContent = quote.source;

    btn.textContent = game.levelNum < 3 ? '▶ 下一关' : '🏆 查看总结';
    btn.className = 'win-btn';
    // Show bottom next button too
    if (game.levelNum < 3) {
      document.getElementById('btn-next').style.display = 'block';
      drawBottomBarCanvas();
    }
    btn.onclick = () => {
      hidePopup();
      if (game.levelNum < 3) {
        game.nextLevel();
      } else {
        showSummary();
      }
    };
  } else if (type === 'lose') {
    icon.textContent = '😞';
    title.textContent = '修复失败';
    msg.textContent = message;
    btn.textContent = '🔄 重新挑战';
    btn.className = 'lose-btn';
    btn.onclick = () => {
      hidePopup();
      game.restartLevel();
    };
  }
}

  document.getElementById('popup-overlay').classList.remove('active');

// 13a. Block Preview Helper — Canvas 方块缩略图
// ============================================================
function renderBlockPreviews(container, types, highlightType) {
  const previewSize = 44;
  const gap = 8;
  const totalW = types.length * previewSize + (types.length - 1) * gap;
  container.innerHTML = '<canvas width="' + totalW + '" height="' + (previewSize + 22) + '" style="display:block;margin:0 auto;"></canvas>';
  const cvs = container.querySelector('canvas');
  if (!cvs) return;
  const pctx = cvs.getContext('2d');
  types.forEach(function(t, i) {
    var x = i * (previewSize + gap);
    drawBlockPreview(pctx, x, 0, previewSize, t.type);
    pctx.fillStyle = t.type === highlightType ? '#F0DC82' : '#FDF8D0';
    pctx.font = 'bold 10px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
    pctx.textAlign = 'center';
    pctx.fillText(t.label, x + previewSize / 2, previewSize + 14);
    if (t.type === highlightType) {
      pctx.strokeStyle = '#E1CB6B';
      pctx.lineWidth = 2;
      pctx.setLineDash([3, 2]);
      pctx.strokeRect(x - 1, -1, previewSize + 2, previewSize + 2);
      pctx.setLineDash([]);
      pctx.fillStyle = '#FF6F00';
      pctx.font = 'bold 8px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
      pctx.fillText('NEW', x + previewSize / 2, -4);
    }
  });
}

function drawBlockPreview(pctx, x, y, size, type) {
  var ctx = pctx;
  if (!BLOCK_COLORS[type]) return;
  var pad = Math.max(1, Math.floor(size * 0.06));
  var inner = size - pad * 2;
  var br = Math.max(2, size * 0.12);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = size * 0.05;
  ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;

  // Draw PNG block image (with rounded-rect clip for clean edges)
  var img = blockImages[type];
  if (img && img.complete && img.naturalWidth > 0) {
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.save();
    ctx.clip();
    ctx.drawImage(img, x + pad, y + pad, inner, inner);
    ctx.restore();
  } else {
    // Fallback: simple colored rounded rect while image loads
    var colors = BLOCK_COLORS[type];
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.fillStyle = colors.fill;
    ctx.fill();
    roundRectCtx(ctx, x + pad, y + pad, inner, inner, br);
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = Math.max(1, size * 0.03);
    ctx.stroke();
  }

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  ctx.restore();
}

function roundRectCtx(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// 13c. TUTORIAL SYSTEM — 交互式试玩教程 (Level 1 only)
// ============================================================
function findSwapForMatch(board, matchType) {
  const size = board.length;
  // Try every adjacent pair
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      // Try swap right
      if (c + 1 < size) {
        swapCellsRaw(board, r, c, r, c + 1);
        const matches = findAllMatches(board).matchGroups;
        const found = matches.some(m => matchType === 'pollutant' ? m.type !== BLOCK.LOOSE_SOIL : m.type === BLOCK.LOOSE_SOIL);
        swapCellsRaw(board, r, c, r, c + 1); // swap back
        if (found) return [{ r, c }, { r: r, c: c + 1 }];
      }
      // Try swap down
      if (r + 1 < size) {
        swapCellsRaw(board, r, c, r + 1, c);
        const matches = findAllMatches(board).matchGroups;
        const found = matches.some(m => matchType === 'pollutant' ? m.type !== BLOCK.LOOSE_SOIL : m.type === BLOCK.LOOSE_SOIL);
        swapCellsRaw(board, r, c, r + 1, c); // swap back
        if (found) return [{ r, c }, { r: r + 1, c }];
      }
    }
  }
  return null;
}

function swapCellsRaw(board, r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

function isSameSwap(cells, r1, c1, r2, c2) {
  const ids = cells.map(c => c.r + ',' + c.c).sort().join('|');
  const swapIds = [r1 + ',' + c1, r2 + ',' + c2].sort().join('|');
  return ids === swapIds;
}

// Seed loose_soil blocks to guarantee a valid tutorial swap for Phase B
function seedLooseSoilSwap(board) {
  const size = board.length;
  // Pattern: place L at (r, c+1), (r+1, c), (r+1, c+2)
  // Swapping (r, c+1) with (r+1, c+1) creates row r+1: L L L → 3-match
  for (let r = 0; r < size - 1; r++) {
    for (let c = 0; c < size - 2; c++) {
      // Check this area isn't already full of matching patterns
      board[r][c + 1] = BLOCK.LOOSE_SOIL;
      board[r + 1][c] = BLOCK.LOOSE_SOIL;
      board[r + 1][c + 2] = BLOCK.LOOSE_SOIL;
      // Ensure the swap target is NOT loose_soil (needs to actually swap different blocks)
      if (board[r + 1][c + 1] === BLOCK.LOOSE_SOIL) {
        board[r + 1][c + 1] = BLOCK.ORGANIC;
      }
      // Clear any pre-existing matches this might have created
      const { matchGroups } = findAllMatches(board);
      if (matchGroups.length > 0) {
        // Replace matched cells with random pollutants to break the match
        const cfg = game.levelConfig;
        for (const mg of matchGroups) {
          for (const cell of mg.cells) {
            if (board[cell.r][cell.c] === BLOCK.LOOSE_SOIL) {
              board[cell.r][cell.c] = cfg.pollutants[Math.floor(Math.random() * cfg.pollutants.length)];
            }
          }
        }
      }
      return;
    }
  }
}

// Position tooltip to avoid covering highlighted cells
function positionTutorialTooltip(targetCells) {
  const tooltip = document.getElementById('guide-tooltip');
  const boardWrapper = document.getElementById('board-wrapper');
  const boardRect = boardWrapper.getBoundingClientRect();
  const canvasEl = document.getElementById('game-canvas');
  const canvasRect = canvasEl.getBoundingClientRect();

  // Calculate screen positions of the two highlighted cells
  const scaleX = canvasEl.width / canvasRect.width;
  const scaleY = canvasEl.height / canvasRect.height;
  const cellPositions = targetCells.map(function(cell) {
    return {
      x: canvasRect.left + (boardMargin + cell.c * cellSize + cellSize / 2) / scaleX,
      y: canvasRect.top + (boardMargin + cell.r * cellSize + cellSize / 2) / scaleY
    };
  });

  // Average position of highlighted cells
  const avgY = (cellPositions[0].y + cellPositions[1].y) / 2;
  const avgX = (cellPositions[0].x + cellPositions[1].x) / 2;

  // Determine if cells are in top or bottom half of board
  const boardMidY = boardRect.top + boardRect.height / 2;
  const cellsInBottomHalf = avgY > boardMidY;

  const tw = tooltip.offsetWidth || 260;
  const th = tooltip.offsetHeight || 130;
  const topBar = document.getElementById('top-bar');
  const bottomBar = document.getElementById('bottom-bar');
  const topBarBottom = topBar ? topBar.getBoundingClientRect().bottom : 0;
  const bottomBarTop = bottomBar ? bottomBar.getBoundingClientRect().top : window.innerHeight;

  // Position horizontally centered on the highlight cells
  let left = avgX;
  left = Math.max(tw / 2 + 8, Math.min(left, window.innerWidth - tw / 2 - 8));

  let top;
  if (cellsInBottomHalf) {
    // Highlighted cells in bottom half → place tooltip ABOVE the board
    top = boardRect.top - th - 10;
    tooltip.classList.remove('arrow-up');
    tooltip.classList.add('arrow-down');
  } else {
    // Highlighted cells in top half → place tooltip BELOW the board
    top = boardRect.bottom + 10;
    tooltip.classList.remove('arrow-down');
    tooltip.classList.add('arrow-up');
  }

  // Clamp to safe area
  top = Math.max(topBarBottom + 4, Math.min(top, bottomBarTop - th - 4));
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.transform = 'translateX(-50%)';
}

const tutorialSystem = {
  phase: 'done',        // 'pollutant' | 'loose_soil' | 'done'
  targetCells: [],      // [{r, c}, {r, c}]
  waitingForSwap: false,
  highlightIntensity: 0,

  start(board) {
    if (this.phase !== 'done') return;
    this.phase = 'pollutant';
    this.startPhase(board);
  },

  startPhase(board) {
    // Reset cascade guard for each phase
    this._chainFired = false;

    const matchType = this.phase === 'pollutant' ? 'pollutant' : 'loose_soil';
    let swap = findSwapForMatch(board, matchType);

    // For loose_soil phase, seed the board if no valid swap exists
    if (!swap && this.phase === 'loose_soil') {
      seedLooseSoilSwap(board);
      swap = findSwapForMatch(board, matchType);
    }

    if (!swap) {
      // No valid tutorial swap found — skip tutorial
      this.phase = 'done';
      guideSystem.completed = true;
      return;
    }
    this.targetCells = swap;
    this.waitingForSwap = true;

    const tooltip = document.getElementById('guide-tooltip');

    if (this.phase === 'pollutant') {

        '<strong>试试看！</strong><br>拖动这两个<strong style="color:#F0DC82;">高亮闪烁</strong>的方块互换<br>来消除污染物！</div>' +
        '<div class="guide-close" id="tutorial-skip-btn" style="margin-top:6px;opacity:0.6;font-size:10px;">跳过教程 →</div></div>';
    } else {
      html = '<div style="text-align:center;">' +
        '<span style="font-size:28px;">🌱</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>最后一步！</strong><br>交换这两个<strong style="color:#F0DC82;">疏松土块</strong><br>复耕第一块健康耕地！</div>' +
        '<div class="guide-close" id="tutorial-skip-btn" style="margin-top:6px;opacity:0.6;font-size:10px;">跳过教程 →</div></div>';
    }

    tooltip.innerHTML = html;
    // Position tooltip away from highlighted cells
    positionTutorialTooltip(this.targetCells);
    // Don't activate backdrop during interactive swap phases — it blocks touch events on canvas
    tooltip.style.display = 'block';
    startRenderLoop();

    // Skip button handler
    var self = this;
    document.getElementById('tutorial-skip-btn').addEventListener('click', function() {
      self.phase = 'done';
      self.targetCells = [];
      self.waitingForSwap = false;
      guideSystem.hide();
      guideSystem.completed = true;
      stopRenderLoop();
      game.render();
    });
  },

  onSwap(r1, c1, r2, c2) {
    if (!this.waitingForSwap) return false;
    if (!isSameSwap(this.targetCells, r1, c1, r2, c2)) {
      // Wrong swap — brief shake/hint
      const tooltip = document.getElementById('guide-tooltip');
      tooltip.style.animation = 'none';
      tooltip.offsetHeight; // reflow
      tooltip.style.animation = 'tutorialShake 0.4s ease';
      return false; // Allow the swap but show it's wrong
    }
    // Correct swap! Let the game process it
    this.waitingForSwap = false;
    return true;
  },

  onChainComplete(board) {
    if (this.phase === 'done') return;
    // Guard against multiple cascade calls — only handle first chain completion
    if (this._chainFired) return;
    this._chainFired = true;

    const tooltip = document.getElementById('guide-tooltip');
    const backdrop = document.getElementById('guide-backdrop');

    if (this.phase === 'pollutant') {
      // Show success, then move to phase B
      tooltip.innerHTML = '<div style="text-align:center;">' +
        '<span style="font-size:28px;">✅</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>成功！</strong>污染物被清除了<br>中间格子变成了疏松土块！</div>' +
        '<div class="guide-close" id="tutorial-next-btn">👉 继续</div></div>';
      guideSystem.positionNear(document.getElementById('board-wrapper'), 'up', true);
      backdrop.classList.add('active');
      tooltip.style.display = 'block';
      document.getElementById('tutorial-next-btn').addEventListener('click', () => {
        guideSystem.hide();
        // Move to phase B — use current game.board which is the final post-chain state
        this.phase = 'loose_soil';
        this.targetCells = [];
        stopRenderLoop();
        game.render();
        setTimeout(() => this.startPhase(game.board), 500);
      });
    } else if (this.phase === 'loose_soil') {
      // Final success
      tooltip.innerHTML = '<div style="text-align:center;">' +
        '<span style="font-size:32px;">🌾</span>' +
        '<div style="font-size:13px;line-height:1.7;margin:6px 0;">' +
        '<strong>太棒了！</strong>你成功复耕了<br>第一块<strong style="color:#66BB6A;">健康耕地</strong>！</div>' +
        '<div class="guide-close" id="tutorial-done-btn">🎮 开始游戏</div></div>';
      guideSystem.positionNear(document.getElementById('board-wrapper'), 'up', true);
      backdrop.classList.add('active');
      tooltip.style.display = 'block';
      document.getElementById('tutorial-done-btn').addEventListener('click', () => {
        guideSystem.hide();
        this.phase = 'done';
        this.targetCells = [];
        guideSystem.completed = true;
        stopRenderLoop();
        game.render();
      });
    }
  },

  renderHighlights(ctx) {
    if (this.phase === 'done' || this.targetCells.length !== 2 || !cellSize) return;
    if (guideSystem.completed && this.phase === 'done') return;
    const now = performance.now();
    const cs = cellSize;
    const M = boardMargin;
    // Draw directional connector between the two cells
    const [a, b] = this.targetCells;
    const ax = M + a.c * cs + cs / 2, ay = M + a.r * cs + cs / 2;
    const bx = M + b.c * cs + cs / 2, by = M + b.r * cs + cs / 2;
    const midX = (ax + bx) / 2, midY = (ay + by) / 2;
    // Animated arrow between cells
    const arrowBob = Math.sin(now / 400) * 4;
    const arrowAlpha = 0.5 + 0.5 * Math.sin(now / 300);
    ctx.save();
    ctx.globalAlpha = arrowAlpha;
    ctx.fillStyle = '#F0DC82';
    ctx.font = (cs * 0.55) + 'px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👇', midX, midY + arrowBob);
    ctx.restore();
    const highlightCell = (cell, phaseOffset) => {
      const x = M + cell.c * cs, y = M + cell.r * cs;
      const pad = 1;
      const pulseSlow = 0.5 + 0.5 * Math.sin(now / 400 + phaseOffset);
      const pulseFast = 0.5 + 0.5 * Math.sin(now / 180 + phaseOffset);
      const alphaOuter = 0.5 + 0.45 * pulseSlow;
      const alphaInner = 0.7 + 0.3 * pulseFast;
      ctx.save();
      // Layer 1: Wide outer glow
      ctx.shadowColor = 'rgba(255, 180, 0, ' + (alphaOuter * 0.7) + ')';
      ctx.shadowBlur = cs * 0.55;
      ctx.strokeStyle = 'rgba(255, 200, 0, ' + alphaOuter + ')';
      ctx.lineWidth = 5 + 3 * pulseSlow;
      roundRectCtx(ctx, x + pad, y + pad, cs - pad * 2, cs - pad * 2, Math.max(3, cs * 0.12));
      ctx.stroke();
      // Layer 2: Mid bright border
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255, 235, 100, ' + alphaInner + ')';
      ctx.lineWidth = 3.5 + 2 * pulseFast;
      roundRectCtx(ctx, x + pad + 3, y + pad + 3, cs - (pad + 3) * 2, cs - (pad + 3) * 2, Math.max(2, cs * 0.1));
      ctx.stroke();
      // Layer 3: Inner white-hot ring
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + (alphaInner * 0.8) + ')';
      ctx.lineWidth = 2;
      roundRectCtx(ctx, x + pad + 6, y + pad + 6, cs - (pad + 6) * 2, cs - (pad + 6) * 2, Math.max(2, cs * 0.08));
      ctx.stroke();
      // Corner brackets
      const br = cs * 0.18; // bracket length
      const bw = 3 + 2 * pulseFast; // bracket width
      const bAlpha = 0.6 + 0.4 * pulseFast;
      ctx.strokeStyle = 'rgba(255, 255, 255, ' + bAlpha + ')';
      ctx.lineWidth = bw;
      ctx.lineCap = 'round';
      // Top-left corner
      ctx.beginPath();
      ctx.moveTo(x + pad + 4, y + pad + 4 + br);
      ctx.lineTo(x + pad + 4, y + pad + 4);
      ctx.lineTo(x + pad + 4 + br, y + pad + 4);
      ctx.stroke();
      // Top-right corner
      ctx.beginPath();
      ctx.moveTo(x + cs - pad - 4 - br, y + pad + 4);
      ctx.lineTo(x + cs - pad - 4, y + pad + 4);
      ctx.lineTo(x + cs - pad - 4, y + pad + 4 + br);
      ctx.stroke();
      // Bottom-left corner
      ctx.beginPath();
      ctx.moveTo(x + pad + 4, y + cs - pad - 4 - br);
      ctx.lineTo(x + pad + 4, y + cs - pad - 4);
      ctx.lineTo(x + pad + 4 + br, y + cs - pad - 4);
      ctx.stroke();
      // Bottom-right corner
      ctx.beginPath();
      ctx.moveTo(x + cs - pad - 4, y + cs - pad - 4 - br);
      ctx.lineTo(x + cs - pad - 4, y + cs - pad - 4);
      ctx.lineTo(x + cs - pad - 4 - br, y + cs - pad - 4);
      ctx.stroke();
      ctx.lineCap = 'butt';
      // Sparkle dots orbiting the cell
      const sparkleCount = 4;
      for (let i = 0; i < sparkleCount; i++) {
        const angle = (now / 1200 + i / sparkleCount) * Math.PI * 2;
        const dist = cs * 0.42;
        const sx = x + cs / 2 + Math.cos(angle) * dist;
        const sy = y + cs / 2 + Math.sin(angle) * dist;
        const sparkSize = 3 + 2 * Math.sin(now / 200 + i);
        ctx.fillStyle = 'rgba(255, 255, 220, ' + (0.5 + 0.5 * Math.sin(now / 250 + i * 1.5)) + ')';
        ctx.shadowColor = 'rgba(255, 220, 50, 0.9)';
        ctx.shadowBlur = sparkSize * 2;
        ctx.beginPath();
        ctx.arc(sx, sy, sparkSize, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    };
    highlightCell(this.targetCells[0], 0);
    highlightCell(this.targetCells[1], Math.PI);
  }
};

// Dismiss guide by clicking backdrop
document.getElementById('guide-backdrop').addEventListener('click', () => {
  // Don't dismiss during interactive tutorial swap phase
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.waitingForSwap) return;
  // If tutorial is in progress, clean it up fully
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.phase !== 'done') {
    tutorialSystem.phase = 'done';
    tutorialSystem.targetCells = [];
    tutorialSystem.waitingForSwap = false;
    stopRenderLoop();
  }
  guideSystem.completed = true;
  guideSystem.hide();
  game.render();
});

// Hook guide into game processChain
const origProcessChain = game.processChain.bind(game);
game.processChain = function(matchGroups) {
  const hasLooseSoilMatch = matchGroups.some(m => m.type === BLOCK.LOOSE_SOIL);
  const hasPollutantMatch = matchGroups.some(m => m.type !== BLOCK.LOOSE_SOIL);

  if (hasPollutantMatch) guideSystem.notifyMatch();
  if (hasLooseSoilMatch) guideSystem.notifyReclaim();

  // If waiting for first swap, mark complete
  if (guideSystem.waitingForSwap) {
    guideSystem.hide();
    guideSystem.waitingForSwap = false;
  }

  const result = origProcessChain(matchGroups);

  // Notify tutorial after chain completes
  if (typeof tutorialSystem !== 'undefined' && tutorialSystem.phase !== 'done') {
    setTimeout(() => tutorialSystem.onChainComplete(game.board), 500);
  }

  return result;
};

// ============================================================
// 14. LEVEL SELECTOR LOGIC
// ============================================================
function updateLevelSelector() {
  const savedLevel = loadProgress();
  const currentLevel = game.levelNum;
  const buttons = document.querySelectorAll('.level-btn');

  buttons.forEach(btn => {
    const lv = Number(btn.dataset.level);
    btn.classList.remove('active', 'unlocked', 'locked');
    btn.disabled = false;

    if (lv === currentLevel) {
      btn.classList.add('active');
      btn.textContent = lv + ' · ' + LEVELS[lv - 1].name;
    } else if (lv <= savedLevel) {
      btn.classList.add('unlocked');
      btn.textContent = lv + ' · ' + LEVELS[lv - 1].name;
    } else {
      btn.classList.add('locked');
      btn.textContent = '🔒 ' + lv + ' · ' + LEVELS[lv - 1].name;
      btn.disabled = true;
    }
  });

  // Redraw hand-drawn level selector canvas
  drawLevelCanvasFn();
}

// Level button click handlers
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('locked')) return;
    const lv = Number(btn.dataset.level);
    if (lv !== game.levelNum) {
      initAudio();
      game.initLevel(lv);
      updateLevelSelector();
    }
  });
});

// ============================================================
// 15. BUTTON HANDLERS
// ============================================================
document.getElementById('btn-restart').addEventListener('click', () => {
  initAudio();
  game.restartLevel();
  updateLevelSelector();
});

document.getElementById('btn-next').addEventListener('click', () => {
  initAudio();
  game.nextLevel();
  updateLevelSelector();
});

document.getElementById('btn-rules').addEventListener('click', () => {
  showRulesPopup();
});

document.getElementById('btn-mute').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('btn-mute').textContent = muted ? '🔇' : '🔊';
  if (muted) {
    stopBackgroundMusic();
  } else {
    resumeBackgroundMusic();
  }
});

document.getElementById('btn-summary-restart').addEventListener('click', () => {
  document.getElementById('summary-screen').classList.remove('active');
  document.getElementById('game-container').style.display = '';
  game.restartAll();
  updateLevelSelector();
});

// ============================================================
// 16. INIT
// ============================================================
function startGame() {
  const savedLevel = loadProgress();
  game.initLevel(savedLevel);
  updateLevelSelector();

  // Initial UI canvas render — double rAF ensures post-layout sizing
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      redrawAllUI();
    });
  });

  // Handle resize
  window.addEventListener('resize', () => {
    resizeCanvas(game.levelConfig.size);
    game.render();
    redrawAllUI();
  });

  console.log('🌾 沃土新生 — Ready');
  console.log('关卡:', game.levelConfig.name);
  console.log('棋盘:', game.levelConfig.size + '×' + game.levelConfig.size);
  console.log('目标: 复耕', game.target, '块健康耕地');
}
