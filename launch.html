<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沃土新生 — 手机扫码入口</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(180deg, #F1E0C8 0%, #E8D5B7 30%, #D7CCC8 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.9);
    border-radius: 20px; padding: 30px 24px; max-width: 400px; width: 90%;
    text-align: center; box-shadow: 0 8px 32px rgba(62,39,35,0.3);
  }
  .card h1 { font-size: 22px; color: #5D4037; margin-bottom: 4px; }
  .card .sub { font-size: 13px; color: #8D6E63; margin-bottom: 20px; }
  .card img { width: 220px; height: 220px; margin: 0 auto 16px; display: block; border-radius: 12px; border: 3px solid #8D6E63; }
  .card .url {
    display: inline-block; background: #5D4037; color: #FFD54F;
    padding: 8px 18px; border-radius: 20px; font-size: 13px; word-break: break-all;
    text-decoration: none; margin-bottom: 12px;
  }
  .card .tip { font-size: 12px; color: #A1887F; line-height: 1.6; }
  .card .tip strong { color: #E53935; }
</style>
</head>
<body>
<div class="card">
  <h1>🌾 沃土新生</h1>
  <div class="sub">2026 年全国土地日 · H5 三消游戏</div>

  <img src="qr-code.png" alt="QR Code">

  <a class="url" href="https://fazionxxx.github.io/wotu/" target="_blank">
    https://fazionxxx.github.io/wotu/
  </a>

  <div class="tip">
    📱 <strong>方式一</strong>：用手机扫描上方二维码<br>
    💻 <strong>方式二</strong>：点击上方链接直接打开<br><br>
    ⚠️ 首次访问若出现 loca.lt 提示页，<br>点击 <strong>"Click to Continue"</strong> 即可进入游戏。
  </div>
</div>
</body>
</html>
